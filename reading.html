ing in Chinese is different from writing in English. The meaning and references used in Chinese science fiction are unique to the genre. In the stories Ken Liu translated,multiple footnotes are used to describe details Western readers may not understand, and they explain why a word or sentence is written in a certain way.", "The use of traditional and cultural objects and places in Chinese science fiction makes the genre a cultural and historical analysis of China. This also gives translated works a foreign and distinct feel. After reading The Three-Body Problem, for example, Western readers discover some differences and simi larities between Western and Asian cultures."], "qs": ["1. When did science fiction become popular?", "A. After the year 2000. B. After the year 2014.", "C. Before the year 2000. D. Before the year 2014.", "2. Which of the following statements is TRUE?", "A. The Three-Body Problem is the first Chinese science fiction novel.", "B. The Three-Body Problemi s a hard science fiction written by Ken Liu.", "C. The Three-Body Problemi s a soft science fiction written by Liu Cixin.", "D. Ken Liu's translation of The Three-Body Problem is the first contemporary Chinese science", "fiction novel in English.", "3. Which is the feature of Ken Liu's translation?", "A. The references are special. B. It is a mind-boggling work.", "C. There are multiple footnotes. D. It is a new and unique genre.", "4. Why was Chinese science fiction little known to westerners before the year 2000?", "A. Because Western readers do not like science fiction.", "B. Because few works were translated into English then.", "C. Because The Three-Body Problem was not published then.", "D. Because there are differences between Western and Asian cultures.", "5. According to the passage, which is NOT the reason why The Three-Body Problem is a big success", "in the Western world?", "A. Chinese places make it a distinct feel to westerners.", "B. Chinese cultures make it a distinct feel to westerners.", "C. Chinese histories make it a distinct feel to westerners.", "D. Western readers are very familiar with Chinese culture."], "qn": 5}, {"label": "第三十二（2022 河南 D）", "title": "", "paras": ["With the coming of the Internet, online communities have figured out a way to generate profit from the sharing of those underused property. Using websites and social media groups that facilitate the buying and selling of second-hand goods, it is now easier than ever for peer-to-peer sharing activities to take place. And this is known as the sharing economy.", "These popular online platforms are providing a chance for people to make a quick fortune. To give an example, busy parents previously might not have bothered with setting up a stall at the local market to sell their children's old equipment, but with online marketplaces, parents are now able to sell on those hardly worn baby clothes that their children have outgrow n so as to put some cash back into their pockets.", "Businesses have also caught on to the profitability of the sharing economy and are seeking to gain from making use of those underutilized resources. Companies like Airbnb act as a middleman for people to cash in on their unused rooms and houses and let them out as profitable accommodation. Another example is Uber, which encourages people to use their own personal cars as taxis to make some extra cash in their free time.", "This move towards a sharing economy is not without criticisms. Unlike businesses, unregulated indiv iduals do not have to follow certain regulations and this can lead to poorer and inconsistent quality of goods and services and a higher risk of fraud. Nevertheless, in the consumerist society we live in today, the increased opportunities to sell on our unwanted and underused goods can lead to a lesser impact on our environment"], "qs": ["1. Why can people now sell things more easily ?", "A. Because people nowadays buy more things", "B. Because businesses want to buy the things they don't use", "C. Because there are now more market stalls", "D. Because there are now online platforms to do business", "2. Which of the following is something that we might under utilize?", "A. A thick coat in a cold country B. Clothes our babies don't or can't wear any more", "C. The latest smart phone D. The new cupboard in our house", "3.Why do people get involved in the sharing economy ?", "A. Because they want to set up a stall", "B. Because they want to recycle the underused things", "C. Because they want to make a fortune", "D. Because they want to protect the environment", "19. It might cause problems when unregulated individuals sell things to others because .", "A. what they sell might be of a lower quality", "B. they have to follow certain regulations", "C. they don't have a business license", "D. they like to criticize their buyers HONG LIANG", "20. What might be a suitable title for this article ?", "A. The Consumerist Society B. Parents Who Need Money", "C. The Rise of the Sharing Economy D. Why We Buy Things We Don't Need"], "qn": 5}, {"label": "第三十三（2024 辽宁 A）", "title": "The changing Face of Kung Fu", "paras": ["According to legend, in the fifth century, an Indian master taught some monks at the Shaolin Temple a series of exercises, or forms, inspired by the movements of animals. These forms became the basis for the style of fighting known as kung fu. Over 16 centuries, the monks have used kung fu for self- defense and in war. With it, they have won many battles against their enemies.", "In Dengfeng today, ten kilometers ( six miles) from the Shaolin Temple, there are over 60 martial arts schools with more than 50, 000 students. Students come to the schools for a variety of reasons. Some hope to become movie stars. Others come to learn skills that will ensure good jobs in the military or police force. A few are sent by their parents to learn self- control and hard work.", "Master Hu CarsonZhengsheng teaches at a small school in Dengfeng. Recently, he was offered an important role in a kung fu movie. It would have been good publicity for his school. However, he did not accept. He doesn't agree with how kung fu is often shown in movies. He feels they show too much violence. Unlike many large schools, which teach acrobatics and kickboxing, Hu teaches his students traditional kung fu forms. He teaches them the way his master—a Shaolin legend— taught him. But attracting new students to this style of kung fu has become a problem. CarsonHu is afraid his art will soon die out. He has to remind his students that kung fu was designed for fighting, not to entertain.", "\" There are no high kicks or acrobatics [ here],\" he says. \" It is hard to convince boys to spend many years learning something that won't make them wealthy or famous.\" Hu's students have little. They sleep in unheated rooms and train outside no matter what the temperature. They hit trees with their bare hands and take turns sitting on each other's shoulders to build leg strength. Why such hardship? To master kung fu, they must learn respect, and how to\" eat bitterness,\" a Mandarin expression meaning \" to endure suffering.\" The life of a Shaolin master, Hu Carsonteaches, is not easy or attractive. Master Hu is in a difficult position. For old traditions to survive, the young must learn. Gradually, he has begun offering a few courses in kickboxing and the acrobatic kung fu forms, hoping to attract new students. Then, maybe, he' ll be able to convince them to learn Shaolin kung fu the traditional way."], "qs": ["1. Which is NOT given as a reason why people study kung Fu?", "A. to learn self- control B. to think more clearly", "C. to help get good jobs D. to become movie stars", "2. What is the purpose of the third paragraph?", "A. to show why Hu teaches acrobatics and kickboxing", "B. to convince people that they can be rich and famous", "C. to explain the challenges traditional kung fu schools face", "D. to show how Hu's ideas about kung fu are different from other kung fu teachers", "3. What does here refer to in paragraph 5?", "A. in Fung fu movies B. in the Shaolin Temple", "C. in Master Hu's school D. in the city of Dengfeng", "4. Which of the following is closest in meaning to no matter what the temperature ( paragraph 6)?", "A. even if they feel sick B. even if it's very hot or cold", "C. only when the temperature is hot D. because it's warmer than in their rooms", "5. In paragraph 6, the words endure suffering mean", "A. stop the suffering B. make someone suffer", "C. survive the suffering D. make the suffering worse"], "qn": 5}, {"label": "第三十四（2024 山东 A）", "title": "", "paras": ["College professors these days face an ever-higher bar to grab the attention of their students, forced to compete with the pulling power of smartphones and laptops in large lecture halls. But when your professor is a social media star, it is a little bit easier.", "Tatiana Erkhimova, who teaches physics at Texas A&amp;M University has managed to get her students, as well as future generations, excited about the science. Known as \"Dr. Tatiana\" to her students and online fan base, the professor performs physics tricks with boundless energy and enthusiasm. Videos of her theatrical demonstrations have attracted hundreds of millions of views across social media platforms.", "In the kid-friendly videos, Erukhimova uses a range of everyday objects in her experiments, from pingpong balls and toilet paper to marshmallows, bicycle wheels and hair dryers. She credits the university marketing team's videos of her lessons for her social media success. \"This is just one of our ways to connect with people to make physics accessible to people,\" she tells NPR. As part of the physics department's extensive program, she also puts on shows almost every week teaching physics to K-12 students. The sooner kids are taught physics and taught it well, the better, she says.", "It is clear she knows what it takes to get young people excited about science. But it was not always that way. When she first started teaching college freshman classes almost two decades ago, she says she struggled to grab the attention of her younger students. She was used to teaching juniors, as she had for a few years prior to that. By junior year, students majoring in physics are committed to leaning, She says. But when it comes to teaching a large lecture hall of 100-plus first-year students, first impressions are make or break.", "\"I did not grab their attention on the first day that was my mistake,\" she says. \"I missed this opportunity to bond with them from the very beginning, and then it took me a while to find my voice. \"By the second semester, she found her footing, tweaking her approach to make her lecture halls feel smaller, and get her students engaged.", "The key, she says, has been to make herself approachable and her instruction personal. \"Talk to your students before and after class, walk the stairs when you teach your class rather than stay on the stage. And don't just lecture, talk to them nuke it interactive. When you ask question: you expect the answer,\" she says. \"If you don't have the answer, you go to them and you still make them work with not always easy, but When you're close to them, it's definitely easier\"."], "qs": ["1. According to Pamgmph l, professors find it more difficult to", "A. use smartphones in class B. become social media stars", "C. get students' attention in class D. give lectures without using laptops", "2.What can we learn about Dr. Tatiana from Paragraph 2?", "A. She is a professor of online games.", "B. She performs physics experiments in theaters", "C. She gains less energy from social media platforms", "D. She has made many young people interested in physics", "3.Which is closest in meaning to \"make or break\" in Paragraph 4?", "A.Normal B. Crucial C. Breakable D.Successful", "4.According to Paragraph 5, Dr. Tatiana", "A.found the lecture hall too small", "B.made a mistake in the second semester", "C.got her students engaged at the very beginning", "D.could reflect on and adjust her teaching accordingly", "5.According to the last paragraph, good teachers should be able to", "A. give their lectures in an interactive way", "B.persuade their students to stay on the stage", "C.ask questions that most students cannot answer", "D.force their students to get well prepared before class"], "qn": 5}, {"label": "第三十五（2024 山东 C）", "title": "", "paras": ["Experts suggest that Americans stop worrying about getting a perfect eight hours of sleep, and warn that stressing about the magic number may actually result in a drop in sleep quality and duration. Dr, Reena Mehra, a director of sleep research at the Cleveland Clinic, held that focusing too much on falling asleep may interrupt the process. \"It works against the individual,\" she sad.", "According to the Centers for Disease Control and Prevention, more than a third of Americans do not achieve the recommended seven to nine hours of sleep per night. The agency also found that quality sleep is determined by major sleep episodes that do not have frequent awakenings One paper looking into the ideal amount of sleep found that 'Sleep duration recommendations issued by public health authorities help to inform the population of interventions, policies, and healthy sleep behaviors. However, the ideal amount of sleep required each night can vary between different individuals due to gene-related factors and other reasons, and it is important to adapt our recommendations on a case-by-case basis. \" In the past, a lack of sleep was a sign to bosses that a person was productive and successful. But today, people try to create strategies to make the best use of their rest, Researchers, scientists, psychologists and individuals in the sleep business said that the best course of action when it comes to sleep is to relax.", "Albert Einstein College of Medicine clinical associate professor of psychology Dr. Shelby Hanis said patterns and routines are more important than the magic eight-hour number. However, she stressed that people do not need to be so rigid that they can no longer sleep at all if they have to break from their minute to work late or deal with a restless child. Harris also noted that it is essential to remember that humans were able to sleep peacefully well before the invention of drugs and technology. \"1he pressure we put on ourselves is making sleep worse,\" she said."], "qs": ["21.In writing Paragraph 2, the author aims to _______.", "A. give a definition B. draw a conclusion", "C. make a comparison D. support a viewpoint", "22.According to Paragraph 4, the ideal amount of sleep required each night ________.", "A. can affect genes B. is based on policies", "C. is different from person to person D. should be revised by public authorities", "23.According to Paragraph 5, in the past, a person lacking sleep was probably regarded as ______.", "A. an old person B. an able person", "C. a person creating strategies D.a person making good use of his or her rest", "24. According to the last paragraph, Dr. Shelby Harris thinks that ________.", "A.rigid persons need longer sleep", "B.a magic number can make you peaceful", "C.good sleep habits can improve your sleep quality", "D.and technology are essential for a restless child", "25.Where is the passage most probably taken from?", "A. An essay on trade. B.A report of public health", "C. A review of a sports event. D. An introduction to an agency."], "qn": 5}, {"label": "第三十六（2018 浙江 B）", "title": "", "paras": ["The Queen has only given one interview while a sovereign(君主). Her true personality remains elusive to the public. However,one thing is clear:Queen Elizabeth is an introvert.Introverts prefer quiet environments and feel energized from spending time alone or with people they know well. They aren't necessarily shy,but they do tend to be more reserved and guarded with strangers. Fellow introverts will appreciate how draining an average day for Her Majesty must be.", "Fortunately,the Queen has some tricks to make public engagements easier. Just like us commoners rely on friends to save us from awkward situations or boring conversations,she subtly signals to her staff when she wants an intervention(介入). If she places her handbag on the table,it indicates that she wants the event to end in the next five minutes. For more urgent situations,putting her bag on the floor shows that she wants her lady-in-waiting to rescue her immediately.", "Most comfortable in the countryside,the Queen has a well-known passion for horses and dogs. There is a scene in the hit Netflix show The Crown which reveals a fascinating side of the monarch. While giving Jackie Kennedy a personal tour of Buckingham Palace,the two women find themselves bonding over their respective positions as introverted women who have found themselves in the limelight. Surrounded by the Queen’s beloved dogs,both women admit they are happiest around animals and that their extroverted sisters would have been much better suited to their public roles."], "qs": ["1. The underlined word “ draining ”( paragraph 1) is the closest in meaning to .", "A. frustrating B. exhausting C. demanding D. aspiring", "2. To be rescued immediately in a public engagement, the Queen would .", "A. end the event within five minutes B. place he handbag on the table", "C. wave to her lady-in-waiting D. put her bag on the floor", "3. In the last paragraph,the underlined expression “the two women find themselves bonding over their", "respective positions ” means that the two ladies .", "A. admire each other B. help each other in public", "C. grow closer to each other D. show respect for each other", "4. Queen Elizabeth and Jackie Kennedy share the following traits or facts EXCEPT that .", "A. both have sisters B. both love animals", "C. both enjoy being in public D. both are introverted women", "5. The author's attitude can be described as .", "A. neutral B. critical C. pessimistic D. subjective"], "qn": 5}, {"label": "第三十七（2019 浙江 A）", "title": "", "paras": ["I was raised on a farm during the boom years after World War II. I was the third eldest in a family of six boys—no girls. We were all expected to help out around the farm with whatever needed to be done. My mom was no exception as she worked at any job necessary,while raising us six boys. In my thirteenth year,an event occurred that in hindsight would dramatically alter how I viewed my mom.", "It was a hot summer day. My dad,two of my elder brothers and I were busy in the field baling(打 包)hay for our horses and cows for the winter. Mom remained at home looking after my three younger brothers. She was also there,however,to help offload the full hay rack as quickly as possible to help keep everything running smoothly.", "About 8 p. m.,we headed home after a hard day's work. Mom busily prepared a big supper for all of us at the house. After supper,we boys all took turns having a bath—the annual 4-H day at the Swan River Fair was the following day and three of my brothers and I were marching in the parade at 10 a. m. Mom cleaned up the table and did the dishes by hand. By 10 p. m. we were all exhausted and ready to get to bed.", "Around 1 a. m.,I awoke to use the bathroom. As I staggered through the kitchen on my way there,I was bewildered to see that the lights were still on. To my utter amazement,there was Mom with he:back to me busily ironing. On the table were four neat piles of clothes,including our marching uniforms for the parade.", "It was several years more before I fully realized the significance of what I had witnessed that night:Mom had demonstrated more clearly than any words could have what the love of a mother means."], "qs": ["1. What were the boys supposed to do or:the farm?", "A. To do the dishes. B. To prepare dinner.", "C. To look after the cattle. D. To help with farm work.", "2. How many people are there in the authors family?", "A.3. B.4. C.6 D.8.", "3. When did the author go to the bathroom?", "A. At 1 a. m. B. At 10 a. m.", "C. At 8 p. m. D. At 10 p. m.", "4. Mom ironed clothes for the four boys late in the middle of thenight because .", "A. the clothes were dirty after a day's work", "B. the clothes were spilt over by the supper soup", "C. the four boys were wearing them for the parade", "D. the boys were too exhausted to do it themselves", "5. What is the theme of this passage?", "A. The love of a mother. B. The hardship of farm life.", "C. Boys are naughtier than girls. D. Action speaks louder than words."], "qn": 5}, {"label": "第三十八（2025 全国高考一 A）", "title": "", "paras": ["The greening of planes,trains and automobiles Moving goods and people around the world is responsible for a large part of global CO emissions(排 ₂ 放).As the world races to decarbonize everything, it faces particular problems with transportation—which accounts for about a quarter of our energy-related greenhouse gas emissions. Here's the breakdown of the emissions in 2018 for different modes of transport.", "The fuels for transport need to be not just green,cheap and powerful, but also lightweight and safe enough to be carried around. Each mode of transport has its specific fuel needs.Much is still to be settled,but here are some of the solutions to get us going green.", "This energy transition(变革)is global,and the amount of renewable energy the world will need is “a little bit mind-blowing, \"says mechanical engineer Keith Wipke at the National Renewable Energy Laboratory. It's estimated that the global demand for electricity could more than double by 2050. Fortunately,analyses suggest that renewables are up to the task. \"We need to speed up the development of green energy,and it will all get used,\"says Wipke."], "qs": ["1.What percentage of global transport emissions did road vehicles account for in 2018?", "A.11.6%. B.45.1%. C.74.5%. D.86.1%.", "2.Which mode of transport can go green comparatively easily?", "A.Planes. B.Trucks. C.Trains. D.Ships.", "3.What does Wipke suggest regarding energy transition?", "A.Limiting fuel consumption. B.Putting more effort into renewables.", "C.Improving energy efficiency. D.Making electricity more affordable."], "qn": 3}, {"label": "第三十九（2025 全国高考一 C）", "title": "", "paras": ["While safety improvements might have been made to our streets in recent years,transport studies also show declines in pedestrian(行人)mobility,especially among young children.Many parents say there's too much traffic on the roads for their children to walk safely to school,so they pack them into the car instead. Dutch authors Thalia Verkade and Marco te Brommelstroet are bothered by facts like these. In their new book Movement: How to Take Back Our Streets and Transform Our Lives, they call for a rethink of our streets and the role they play in our lives.", "Life on city streets started to change decades ago. Whole neighborhoods were destroyed to make way for new road networks and kids had to play elsewhere. Some communities fought back. Most famously, a Canadian journalist who had moved her family to Manhattan in the early 1950s led a campaign to stop the destruction of her local park. Describing her alarm at its proposed replacement with an expressway, Jane Jacobs called on her mayor(市长) to champion\" New York as a decent place to live, and not just rush through. \"Similar campaigns occurred in Australia in the late 1960s and 1970s as well.", "Although these campaigns were widespread, the reality is that the majority of the western cities were completely redesigned around the needs of the motor car. The number of cars on roads has been increasing rapidly. In Australia we now have over twenty million cars for just over twenty-six million people, among the highest rate of car ownership in the world.", "We invest a lot in roads that help us rush through,but we fail to account for the true costs.Do we really recognise what it costs us as a society when children can't move safely around our communities?The authors of Movement have it right:it's time to think differently about that street outside your front door."], "qs": ["1.What phenomenon does the author point out in paragraph 1?", "A.Cars often get stuck on the road. B.Traffic accidents occur frequently.", "C.People walk less and drive more. D.Pedestrians fail to follow the rules.", "2.What were the Canadian journalist and other campaigners trying to do?", "A.Keep their cities livable. B.Promote cultural diversity.", "C.Help the needy families. D.Make expressways accessible.", "3.What can be inferred about the campaigns in Australia in the late 1960s and 1970s?", "A.They boosted the sales of cars. B.They turned out largely ineffective.", "C.They won government support. D.They advocated building new parks.", "4.What can be a suitable title for the text?", "A.Why the Rush? B.What's Next? C.Where to Stay? D.Who to Blame?"], "qn": 4}, {"label": "第四十篇（2017 浙江 C）", "title": "", "paras": ["How many hundreds of heroes go unheralded(未宣布的)from the days of the Underground Railroad?While we celebrate such important figures as Harriet Tubman and Frederick Douglass,numerous others were needed to make the operation of the \"railroad\"a success. Runaway slaves had to be given shelter from weather and from search parties. The tale of this awesome phenomenon is one of cooperation,coordination,and brotherly love. The Underground Railroad operated as a secret organization dedicated to assisting runaway slaves from the South. The Railroad should not be thought of,however,as one cohesive body. It was in fact an ever-evolving organization devoted to one cause:protection of one's fellow men and women. It actually began during the colonial period. However,it reached its height in the decades preceding the American Civil War. Acts such as the “Fugitive Slave Act of 1850”(1850年逃奴追缉法案)increased railroad activity and popularity. The ultimate goal of the Underground Railroad was to accomplish the safe arrival of runaway slaves to Canada where the long arm of the law could not reach them. Laws such as the Fugitive Slave Acts of 1793 and 1850 allowed slave owners to recapture escaped slaves and bring them back to bondage in the South.", "Some historians believe this courageous organization was began by Quakers(贵格会教徒)in Pennsylvania and New Jersey. Over time,the backbone of this organization became the numerous free blacks of the North. They were essential to the successful operation of the Underground Railroad. In most cases,fleeing slaves traveled by any means necessary and often on their own in an effort to reach freedom in the North. After arriving in the North the people of the Underground Railroad would provide assistance and supplies in an effort to get them to the guaranteed freedom of Canada."], "qs": ["1. Which of the following statements about the underground railroad is true?", "A. It was a railroad built underground like subway", "B. It was a railroad operated by the us government", "C. It operated as a secret organization to help runaway slaves", "D. It served as a secret route only known to slave owners in the south", "2. From paragraph 2, we know that the runaway slaves .", "A. could not afford to buy their train tickets.", "B. could be recaptured by slave owners", "C. could not get any shelter from bad weather", "D. might reach Canada with the help of search parties", "3. The Underground Railroad began", "A. during the American Civil War B. after the declaration of independence.", "C. during the colonial period D. between 1793 and 1850", "4. Who were essential to the successful operation of the underground railroad?", "A. Slaves in the South B. Quakers in Canada", "C. White people of the south D. Free blacks of the North", "5. The tone of the passage can be described as", "A. objective B. delightful C. pessimistic D. humorous"], "qn": 5}];

/* ================= 本地存储 ================= */
const store={
  get start(){return localStorage.getItem("rd_start")},
  set start(v){localStorage.setItem("rd_start",v)},
  get checks(){try{return JSON.parse(localStorage.getItem("rd_checks"))||{}}catch(e){return{}}},
  set checks(v){localStorage.setItem("rd_checks",JSON.stringify(v))}
};
if(!store.start){store.start=toYMD(new Date())}
function toYMD(d){return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0")}
function dayIndex(){
  const s=new Date(store.start+"T00:00:00"),t=new Date(toYMD(new Date())+"T00:00:00");
  return Math.floor((t-s)/864e5)+1;
}
function key(l,s){return "L"+l+"S"+s}
function isDone(l,s){return !!store.checks[key(l,s)]}
function toggle(l,s){
  const c=store.checks;const k=key(l,s);
  if(c[k])delete c[k];else c[k]=toYMD(new Date());
  store.checks=c;render();
}

/* ================= 发音 ================= */
let voiceCache=null;
function pickVoice(){
  const vs=speechSynthesis.getVoices();
  return vs.find(v=>v.lang==="en-US")||vs.find(v=>v.lang.startsWith("en"))||null;
}
if(window.speechSynthesis)speechSynthesis.onvoiceschanged=()=>{voiceCache=pickVoice()};
function speak(word,btn){
  try{
    speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(word);
    u.lang="en-US";u.rate=.85;
    if(!voiceCache)voiceCache=pickVoice();
    if(voiceCache)u.voice=voiceCache;
    if(btn){btn.classList.add("playing");u.onend=u.onerror=()=>btn.classList.remove("playing")}
    speechSynthesis.speak(u);
  }catch(e){}
}

/* ================= 查词 ================= */
let curWordEl=null;
function lookup(word,el){
  const box=document.getElementById("lookup");
  document.getElementById("lkList").style.display="none";
  const w=word.toLowerCase().replace(/’/g,"'");
  const hit=DICT[w];
  document.getElementById("lkWord").textContent=word;
  if(hit){
    document.getElementById("lkPh").textContent=hit[1]?"/"+hit[1]+"/":"";
    document.getElementById("lkBase").textContent=hit[0]?"原形 "+hit[0]:"";
    document.getElementById("lkZh").textContent=hit[2];
  }else{
    document.getElementById("lkPh").textContent="";
    document.getElementById("lkBase").textContent="";
    document.getElementById("lkZh").textContent="词典未收录（多为人名、地名）";
  }
  document.getElementById("lkSpk").onclick=()=>speak(word,document.getElementById("lkSpk"));
  box.classList.add("show");
  if(curWordEl)curWordEl.classList.remove("sel");
  curWordEl=el;if(el)el.classList.add("sel");
  speak(word,document.getElementById("lkSpk"));
}
function closeLookup(){
  document.getElementById("lookup").classList.remove("show");
  if(curWordEl){curWordEl.classList.remove("sel");curWordEl=null}
  if(typeof phraseSeq==="number")phraseSeq++;      // 取消在途翻译
  try{window.getSelection().removeAllRanges();}catch(e){}   // 清掉选区，避免被重新触发
}
document.querySelector("#lookup .lk-close").onclick=closeLookup;

/* 把一段文字包装成可点词的 HTML */
function wrapWords(text){
  return text.replace(/[A-Za-z]+(?:[’'-][A-Za-z]+)*/g,m=>'<span class="w">'+m+'</span>');
}
function bindWords(root){
  root.querySelectorAll(".w").forEach(s=>{
    s.onclick=e=>{e.stopPropagation();lookup(s.textContent,s)};
  });
}

/* ====== 选中整句 / 多个词：逐词释义 + 整句朗读 ====== */
const WORD_RE=/[A-Za-z]+(?:[’'-][A-Za-z]+)*/g;
/* 在线翻译：带超时，Google 优先、MyMemory 兜底 */
async function mtFetch(url,ms){
  const c=new AbortController();const id=setTimeout(()=>c.abort(),ms||7000);
  try{const r=await fetch(url,{signal:c.signal});clearTimeout(id);return r&&r.ok?r:null;}
  catch(e){clearTimeout(id);return null;}
}
function parseGoogle(j){return (j&&j[0]||[]).map(s=>s&&s[0]).filter(Boolean).join("");}
async function mtTranslate(text){
  const q=encodeURIComponent(text);
  const gUrl="https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=zh-CN&dt=t&q="+q;
  const eg=encodeURIComponent(gUrl);
  // 取 Google JSON（可经代理），pick 用于从代理包装里取出真正的 JSON
  const viaG=(u,pick)=>async()=>{const r=await mtFetch(u);if(!r)throw 0;let d=await r.json();if(pick)d=pick(d);const zh=parseGoogle(d);if(!zh)throw 0;return zh;};
  const myMem=async()=>{const r=await mtFetch("https://api.mymemory.translated.net/get?q="+q+"&langpair=en|zh-CN");if(!r)throw 0;const j=await r.json();const zh=j&&j.responseData&&j.responseData.translatedText;if(!zh||/^(PLEASE|MYMEMORY)/i.test(zh))throw 0;return zh;};
  const build=()=>[
    viaG("https://corsproxy.io/?url="+eg)(),
    viaG("https://api.codetabs.com/v1/proxy/?quest="+eg)(),
    viaG("https://api.allorigins.win/raw?url="+eg)(),
    viaG("https://api.allorigins.win/get?url="+eg, j=>JSON.parse(j.contents))(),
    viaG(gUrl)(),
    myMem(),
  ];
  for(let round=0;round<2;round++){
    try{return await Promise.any(build());}catch(e){}
  }
  return null;
}
let phraseSeq=0;
async function lookupPhrase(text){
  const box=document.getElementById("lookup");
  const words=text.match(WORD_RE)||[];
  if(!words.length)return;
  const disp=text.replace(/\s+/g," ").trim();
  const mySeq=++phraseSeq;
  document.getElementById("lkWord").textContent=disp.length>44?disp.slice(0,44)+"…":disp;
  document.getElementById("lkPh").textContent="";
  document.getElementById("lkBase").textContent="选中 "+words.length+" 词 · 整句翻译";
  const zhBox=document.getElementById("lkZh");
  zhBox.textContent="正在翻译整句…";
  /* 逐词释义：作补充，也是联网失败时的兜底 */
  const list=document.getElementById("lkList");
  list.innerHTML="";
  const seen=new Set();
  words.forEach(wd=>{
    const w=wd.toLowerCase().replace(/’/g,"'");
    if(seen.has(w))return;seen.add(w);
    const hit=DICT[w];
    const item=document.createElement("div");item.className="lk-item";
    const lw=document.createElement("span");lw.className="lw";lw.textContent=wd;
    const lz=document.createElement("span");lz.className="lz";
    if(hit){lz.textContent=(hit[0]?"["+hit[0]+"] ":"")+(hit[2]||"—");}
    else{lz.textContent="未收录（人名/地名）";lz.classList.add("miss");}
    item.appendChild(lw);item.appendChild(lz);
    list.appendChild(item);
  });
  list.style.display="block";
  document.getElementById("lkSpk").onclick=()=>speak(disp,document.getElementById("lkSpk"));
  box.classList.add("show");
  if(curWordEl){curWordEl.classList.remove("sel");curWordEl=null;}
  const zh=await mtTranslate(disp);
  if(mySeq!==phraseSeq)return;            // 已被新的选择覆盖
  if(zh){zhBox.innerHTML="";const t=document.createElement("div");t.className="lk-trans";t.textContent=zh;zhBox.appendChild(t);}
  else{zhBox.textContent="整句翻译暂时没成功（免费翻译线路偶尔会抽风）——重新选一次即可重试；如仍不行请连上 VPN。以下先给出逐词释义：";}
}
function handleSelection(){
  const sel=window.getSelection();
  if(!sel||sel.isCollapsed)return;
  const txt=sel.toString();
  const words=(txt.match(WORD_RE)||[]);
  if(words.length<2)return;               // 少于两个词交给单击查词
  const bx=document.getElementById("artBox");
  if(!bx.contains(sel.anchorNode)||!bx.contains(sel.focusNode))return;
  lookupPhrase(txt);
}
function inLookup(e){return e&&e.target&&e.target.closest&&e.target.closest("#lookup");}
document.addEventListener("mouseup",e=>{if(inLookup(e))return;setTimeout(handleSelection,0);});
document.addEventListener("touchend",e=>{if(inLookup(e))return;setTimeout(handleSelection,10);});

/* ================= 渲染 ================= */
let curTab=1,curArt=0; // curTab: 1..8; curArt: PLAN[curTab-1] 里的下标
{
  const dn=dayIndex();
  curTab=Math.min(Math.max(dn,1),8);
}

function render(){
  const dn=dayIndex();
  document.getElementById("startDate").textContent=store.start;
  document.getElementById("dayNo").textContent=dn<1?"未开始":dn;

  /* 今日任务 */
  const box=document.getElementById("todayTasks");box.innerHTML="";
  let due=[];
  for(let l=1;l<=8;l++)for(const s of STAGES){if(l+s.k===dn)due.push({l,s})}
  if(due.length===0){
    box.innerHTML='<div class="empty">'+(dn>15?"15 天阅读计划已全部走完，可以点「重新开始」再来一轮。":"今天没有到期任务，自由翻阅任意一篇即可。")+'</div>';
  }else{
    for(const{l,s}of due){
      const n=PLAN[l-1].length;
      const d=document.createElement("div");d.className="task";
      const done=isDone(l,s.k);
      d.innerHTML='<span><span class="tag'+(s.k===0?' new':'')+'">'+(s.k===0?"精读":"第"+s.k+"天复习")+'</span>'
        +'<a data-go="'+l+'">Day '+l+'（'+n+' 篇文章）</a>'
        +(done?' <span class="done-txt">✓ 已打卡</span>':'')+'</span>';
      const b=document.createElement("button");
      b.className="tick"+(done?" on":"");b.textContent="✓";
      b.title=done?"取消打卡":"打卡";
      b.onclick=()=>toggle(l,s.k);
      d.appendChild(b);box.appendChild(d);
    }
    box.querySelectorAll("a[data-go]").forEach(a=>a.onclick=()=>{curTab=+a.dataset.go;curArt=0;render();
      document.getElementById("tabs").scrollIntoView({behavior:"smooth"});});
  }

  /* 页签 */
  const tabs=document.getElementById("tabs");tabs.innerHTML="";
  PLAN.forEach((p,i)=>{
    const b=document.createElement("button");
    b.className=i+1===curTab?"cur":"";
    b.innerHTML="Day "+(i+1)+'<span class="sub">'+p.length+" 篇</span>";
    b.onclick=()=>{curTab=i+1;curArt=0;render()};
    tabs.appendChild(b);
  });

  /* 文章胶囊 */
  const plan=PLAN[curTab-1];
  if(curArt>=plan.length)curArt=0;
  const chips=document.getElementById("chips");chips.innerHTML="";
  plan.forEach((ai,i)=>{
    const b=document.createElement("button");
    b.className=i===curArt?"cur":"";
    b.textContent="篇 "+(ai+1);
    b.title=ARTICLES[ai].label;
    b.onclick=()=>{curArt=i;render()};
    chips.appendChild(b);
  });

  /* 文章正文 */
  const art=ARTICLES[plan[curArt]];
  const bx=document.getElementById("artBox");
  let html='<div class="alabel">'+art.label+'　·　全书第 '+(plan[curArt]+1)+' / 41 篇</div>';
  if(art.title)html+='<div class="atitle">'+wrapWords(art.title)+'</div>';
  art.paras.forEach(p=>{html+='<p>'+wrapWords(p)+'</p>'});
  if(art.qs.length){
    html+='<details class="qs"><summary>练习题（'+art.qn+' 道，点击展开 · 原文未附答案）</summary>';
    art.qs.forEach(q=>{html+='<div class="qline">'+wrapWords(q)+'</div>'});
    html+='</details>';
  }
  bx.innerHTML=html;
  bindWords(bx);

  document.getElementById("btnPrev").disabled=curArt===0&&curTab===1;
  document.getElementById("btnNext").disabled=curArt===plan.length-1&&curTab===8;

  /* 复习总表 */
  const m=document.getElementById("matrix");
  let mh="<tr><th>文章组</th>"+STAGES.map(s=>"<th>"+s.n+"<br><span style='font-weight:400'>第"+(s.k===0?"0":s.k)+"天后</span></th>").join("")+"</tr>";
  let total=0,doneN=0;
  for(let l=1;l<=8;l++){
    mh+="<tr><td>Day "+l+"（"+PLAN[l-1].length+" 篇）</td>";
    for(const s of STAGES){
      total++;const dd=isDone(l,s.k);if(dd)doneN++;
      const isToday=l+s.k===dn;
      mh+='<td'+(isToday?' class="today-col"':'')+'><button class="tick'+(dd?" on":"")+'" data-l="'+l+'" data-s="'+s.k+'" title="Day '+l+' '+s.n+'">✓</button></td>';
    }
    mh+="</tr>";
  }
  m.innerHTML=mh;
  m.querySelectorAll("button.tick").forEach(b=>b.onclick=()=>toggle(+b.dataset.l,+b.dataset.s));
  document.getElementById("pbar").style.width=(doneN/total*100)+"%";
  document.getElementById("ptxt").textContent="总进度："+doneN+" / "+total+" 次打卡（"+Math.round(doneN/total*100)+"%）· 黄色列为今天到期";
}

document.getElementById("btnPrev").onclick=()=>{
  if(curArt>0){curArt--}else if(curTab>1){curTab--;curArt=PLAN[curTab-1].length-1}
  render();window.scrollTo({top:document.getElementById("tabs").offsetTop,behavior:"smooth"});
};
document.getElementById("btnNext").onclick=()=>{
  const plan=PLAN[curTab-1];
  if(curArt<plan.length-1){curArt++}else if(curTab<8){curTab++;curArt=0}
  render();window.scrollTo({top:document.getElementById("tabs").offsetTop,behavior:"smooth"});
};
document.getElementById("btnReset").onclick=()=>{
  if(confirm("确定清空全部打卡记录，并把今天设为第 1 天吗？")){
    localStorage.removeItem("rd_checks");store.start=toYMD(new Date());curTab=1;curArt=0;render();
  }
};
render();
</script>
