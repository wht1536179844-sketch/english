<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>英语阅读打卡本 · 41 篇点词即查</title>
<style>
/* ===== 练习本设计令牌（与单词/音标本同一套） ===== */
:root{
  --paper:#FBFCF6;
  --grid:#DDE8D8;
  --line:#A8C4A0;
  --ink:#22303A;
  --ink-soft:#5A6B76;
  --red:#D2402F;
  --red-soft:#F6DAD5;
  --marker:#FFE27A;
  --card:#FFFFFF;
  --radius:10px;
  --serif:"Iowan Old Style","Palatino Linotype",Georgia,"Times New Roman",serif;
  --sans:-apple-system,"Segoe UI","Microsoft YaHei","PingFang SC",sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:var(--sans);color:var(--ink);background:var(--paper);
  background-image:
    linear-gradient(var(--grid) 1px,transparent 1px),
    linear-gradient(90deg,var(--grid) 1px,transparent 1px);
  background-size:28px 28px;
  min-height:100vh;
}
.wrap{max-width:820px;margin:0 auto;padding:24px 16px 120px}

header{
  background:var(--card);border:1px solid var(--grid);border-radius:var(--radius);
  padding:22px 24px 18px;margin-bottom:18px;position:relative;overflow:hidden;
  box-shadow:0 2px 0 rgba(34,48,58,.05);
}
header::before{content:"";position:absolute;left:38px;top:0;bottom:0;width:2px;background:var(--red);opacity:.55}
h1{font-size:24px;letter-spacing:1px;padding-left:24px}
h1 .en{font-family:var(--serif);font-style:italic;font-size:16px;color:var(--red);display:block;margin-top:2px;letter-spacing:.5px}
.meta{padding-left:24px;margin-top:10px;font-size:13px;color:var(--ink-soft);display:flex;gap:16px;flex-wrap:wrap;align-items:center}
.meta b{color:var(--ink)}
button{font-family:var(--sans);cursor:pointer;border:none;border-radius:6px;font-size:13px}
.btn-ghost{background:none;border:1px dashed var(--line);color:var(--ink-soft);padding:4px 10px}
.btn-ghost:hover{border-color:var(--red);color:var(--red)}

.panel{background:var(--card);border:1px solid var(--grid);border-radius:var(--radius);padding:18px 20px;margin-bottom:18px}
.panel h2{font-size:16px;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.panel h2::before{content:"";width:8px;height:8px;background:var(--red);border-radius:50%}
.task{
  display:flex;align-items:center;justify-content:space-between;gap:12px;
  padding:10px 12px;border-radius:8px;margin-bottom:8px;background:var(--paper);
  border:1px solid var(--grid);font-size:14px;flex-wrap:wrap;
}
.task .tag{font-size:12px;padding:2px 8px;border-radius:999px;background:var(--red-soft);color:var(--red);margin-right:8px}
.task .tag.new{background:#E3EEDC;color:#3E7031}
.task a{color:var(--ink);text-decoration:underline dotted var(--line);cursor:pointer}
.task a:hover{color:var(--red)}
.done-txt{color:#3E7031;font-weight:600;font-size:13px}
.empty{color:var(--ink-soft);font-size:14px;padding:6px 2px}

.tick{
  width:46px;height:34px;background:none;border:1.5px solid var(--line);border-radius:6px;
  font-size:20px;color:transparent;transition:all .15s;position:relative;flex:none;
}
.tick:hover{border-color:var(--red)}
.tick.on{border-color:transparent;color:var(--red);transform:rotate(-6deg);font-weight:700}
.tick.on::after{content:"";position:absolute;inset:-4px;border:2px solid var(--red);border-radius:50% 45% 55% 48%;opacity:.7;transform:rotate(4deg)}
.tick:focus-visible{outline:2px solid var(--red);outline-offset:2px}

.tabs{display:flex;gap:6px;margin-bottom:0;flex-wrap:wrap}
.tabs button{
  background:var(--card);border:1px solid var(--grid);padding:8px 14px;border-radius:8px 8px 0 0;
  color:var(--ink-soft);font-size:14px;border-bottom:2px solid transparent;
}
.tabs button.cur{color:var(--red);border-bottom-color:var(--red);font-weight:700}
.tabs button .sub{display:block;font-size:11px;color:var(--ink-soft);font-weight:400}

.board{background:var(--card);border:1px solid var(--grid);border-radius:0 var(--radius) var(--radius) var(--radius)}
.chips{display:flex;gap:6px;flex-wrap:wrap;padding:14px 20px 4px}
.chips button{
  background:var(--paper);border:1px solid var(--grid);border-radius:999px;
  padding:5px 12px;font-size:13px;color:var(--ink-soft);
}
.chips button.cur{background:var(--red);border-color:var(--red);color:#fff;font-weight:600}

.art{padding:8px 22px 22px}
.art .alabel{font-size:12.5px;color:var(--ink-soft);margin:8px 0 4px}
.art .atitle{font-family:var(--serif);font-size:21px;margin-bottom:10px;line-height:1.4}
.art p{
  font-family:var(--serif);font-size:17px;line-height:1.9;margin-bottom:12px;
  text-align:justify;
}
.art .zhnote{font-family:var(--sans);font-size:13px}
.w{cursor:pointer;border-radius:3px}
.w:hover{background:var(--marker)}
.w.sel{background:var(--marker)}
details.qs{margin-top:14px;border-top:1px dashed var(--grid);padding-top:10px}
details.qs summary{cursor:pointer;font-size:14px;color:var(--ink-soft);margin-bottom:8px}
details.qs summary:hover{color:var(--red)}
.qline{font-family:var(--serif);font-size:15.5px;line-height:1.8;margin-bottom:4px}
.artnav{display:flex;justify-content:space-between;padding:0 22px 18px}

/* ===== 底部查词卡 ===== */
#lookup{
  position:fixed;left:50%;bottom:14px;transform:translateX(-50%);
  width:min(560px,calc(100% - 24px));background:var(--card);
  border:1.5px solid var(--red);border-radius:12px;padding:12px 16px;
  box-shadow:0 6px 24px rgba(34,48,58,.18);display:none;z-index:50;
}
#lookup.show{display:block}
#lookup .lk-head{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
#lookup .lk-word{font-family:var(--serif);font-size:22px;font-weight:700}
#lookup .lk-ph{font-size:13px;color:var(--ink-soft)}
#lookup .lk-base{font-size:12px;color:var(--ink-soft)}
#lookup .lk-zh{font-size:14px;line-height:1.7;margin-top:6px;color:var(--ink)}
#lookup .lk-list{margin-top:8px;max-height:42vh;overflow-y:auto;display:none}
#lookup .lk-item{display:flex;gap:10px;padding:5px 0;border-top:1px dashed var(--grid)}
#lookup .lk-item .lw{font-family:var(--serif);font-weight:700;font-size:15px;min-width:96px;flex:none;color:var(--ink)}
#lookup .lk-item .lz{font-size:13.5px;line-height:1.55;color:var(--ink-soft)}
#lookup .lk-item .miss{color:var(--ink-soft);opacity:.6}
#lookup .lk-trans{font-size:16px;line-height:1.75;color:var(--ink);font-weight:500}
#lookup .lk-close{
  position:absolute;top:6px;right:8px;background:none;color:var(--ink-soft);
  font-size:22px;line-height:1;width:38px;height:38px;border-radius:50%;cursor:pointer;z-index:2;
}
#lookup .lk-close:hover{color:var(--red)}
.spk{
  width:28px;height:28px;border-radius:50%;background:none;border:1px solid var(--grid);
  color:var(--ink-soft);font-size:13px;flex:none;
}
.spk:hover,.spk.playing{border-color:var(--red);color:var(--red)}

table{width:100%;border-collapse:collapse;font-size:13px}
th,td{border:1px solid var(--grid);padding:8px 6px;text-align:center}
th{background:var(--paper);font-weight:600;color:var(--ink-soft)}
td:first-child{text-align:left;padding-left:12px;white-space:nowrap}
td .tick{width:38px;height:30px;font-size:17px}
td.today-col{background:#FFF8DF}
.legend{font-size:12px;color:var(--ink-soft);margin-top:10px;line-height:1.8}
.progress{height:8px;background:var(--paper);border:1px solid var(--grid);border-radius:99px;overflow:hidden;margin:12px 0 4px}
.progress i{display:block;height:100%;background:var(--red);border-radius:99px;transition:width .3s}
.ptxt{font-size:12px;color:var(--ink-soft)}

@media (max-width:560px){
  .art{padding:6px 14px 16px}
  .art p{font-size:16px}
  table{font-size:12px}
  td .tick{width:32px;height:28px}
}
@media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>
<div class="wrap">

<header>
  <h1>英语阅读打卡本
    <span class="en">41 Passages · Tap Any Word for Chinese</span>
  </h1>
  <div class="meta">
    <span>开始日期：<b id="startDate">—</b></span>

  </div>
</header>

<section class="panel">

</section>

<nav class="tabs" id="tabs"></nav>
<section class="board">

    <button class="btn-ghost" id="btnPrev">← 上一篇</button>
    <button class="btn-ghost" id="btnNext">下一篇 →</button>

</section>

<section class="panel" style="margin-top:18px">

    也可以<b>按住拖动选中整句</b>，卡片会给出<b>整句中文翻译</b>（需联网）并逐词列出释义。
    在<b>第 1、2、4、7 天</b>重读当天那组文章并打卡——重读时重点回想上次点过的生词。
    文末「练习题」可展开自测（原 PDF 未附答案）。打卡数据保存在本机浏览器里。
  </div>
</section>

</div>

<div id="lookup">
  <button class="lk-close" title="关闭">✕</button>
  <div class="lk-head">
    <span class="lk-word" id="lkWord"></span>
    <span class="lk-ph" id="lkPh"></span>
    <button class="spk" id="lkSpk" title="播放读音">🔊</button>
    <span class="lk-base" id="lkBase"></span>
  </div>
  <div class="lk-zh" id="lkZh"></div>
  <div class="lk-list" id="lkList"></div>
</div>

<script>
/* ================= 数据 ================= */
const ARTICLES=[{"label": "第一篇", "title": "A Beach Tour", "paras": ["Enjoy the beach tour Time: 8:00 a.m.—7:00 p.m.", "Saturday Place: Sunshine Beach Price: Only 30 yuan each Tel: 86795648 A Gr een City Help make the city greener Time: 8:30 a.m.—11:30 a.m.", "Sunday Place: Xishan Park Tel: 88987689 All ages are welcome. City Football Club Join us Time: 2:30 p.m.-5:30 p.m.", "Sunday Place: Ezhou Stadium Tel: 89076589 Age: 9—13 years old"], "qs": ["1. If you take the beach tour, you will pay ________.", "A. 30 yuan B. 40yuan C. 50 yuan D. 70 yuan", "2. Which is NOT mentioned on A Green City?", "A. Telephone. B. Time. C. Place. D. Price.", "2. You can join the City Football Club on ________.", "A. Tuesday B. Monday C. Sunday D. Saturday"], "qn": 3}, {"label": "第二篇", "title": "", "paras": ["(Li Fang is the first prize winner of the Third English Speech Contest for Junior High Students. A journalist of the China Students’ Post is interviewing her.)", "Journalist: Congratulations on your success!", "Li Fang: Thanks. It’s really a great honor for me.", "Journalist: Please tell us what you’ve done to develop your English skills.", "Li Fang: Well, my way is to keep practicing. You know practice makes perfect. It’s very important to take every opportunity to practice speaking English in and out of class.", "Journalist: I guess you keep an English diary, don’t you?", "Li Fang: Yes, I do. I keep it in order to develop my writing skills.", "Journalist: How do you improve your listening and reading skills?", "Li Fang: I often listen to English broadcasts and watch English TV programs in my spare time. And I like to read English stories and newspapers. I read either the China Students’ Post or the 21 st Century before I go to bed.", "Journalist: You’re a very good language learner indeed. What do you want to be when you grow up, Li Fang?", "Li Fang: My dream is either to be a diplomat or to be a teacher of English.", "Journalist: Good for you! I hope your dream will come true. Nice talking to you.", "Li Fang: Thank you, and I enjoyed talking to you, too."], "qs": ["29. Li Fang won the ________ prize in the Third English Speech Contest.", "A. first B. second C. third D. fourth", "30. Li Fang improves her writing skills by ________.", "A. practicing speaking English B. listening to English broadcasts", "C. keeping an English diary D. reading the China Students’ Post", "31. Li Fang ________ in her spare time.", "A. listens to English broadcasts B. writes English stories", "C. watches English movies D. watches Chinese TV programs", "32. Li Fang wants to be ________.", "A. a journalist B. a language learner", "C. a broadcast host D. an English teacher"], "qn": 4}, {"label": "第三篇", "title": "Bowling Mini golf", "paras": ["It is an indoor game. The players take turns to roll a It is an outdoor game. There are 18 holes in a mini golf bowling ball towards 10 bowling pins (球瓶). Each player has course.Each player has seven chances to hit the ball into each hole. two tries to knock down the pins. Points are scored according to The times of hitting will be recorded. That is the score. The person the number of pins knocked down. with the lowest score wins.", "Beach volleyball Baseball It is an outdoor game. The game is held on the sand. There It is an outdoor game. A player in one team throws the ball are two players in each team. They stand on each side of the net. fast. A player in the other team tries to hit it. Hitting a “home run” Who wins? Usually, the first team with 21 points wins the game. (本垒打) is the most exciting moment in a match. 根据语篇内容，选择最佳选项。"], "qs": ["1. Which sport is an indoor game?", "A. Bowling. B. Mini golf. C. Beach volleyball.", "2. How many holes are there in a mini golf course?", "A. 10. B. 18. C. 21.", "3. Where is a beach volleyball game held?", "A. On the grass. B. On the sand. C. On the playground.", "4. What is the most exciting moment in a baseball match?", "A Hitting a “home run”. B. Throwing a ball fast. C. Knocking down the pins.", ".", "5. What’s the text mainly about?", "A. History. B. Travel. C. Sports."], "qn": 5}, {"label": "第四篇", "title": "", "paras": ["(Niu performs on the stage)", "When the other models appeared on the stage, the audience（观众）cheered and clapped. Then it was Niu’s turn. The audience suddenly became silent. However, after four or five seconds, Niu clearly heard someone next to the stage say in admiration, “So cool!”", "Niu Yu, 24, became a shining star at Shanghai Fashion Week for her confidence, even though she was wearing a prosthetic leg. When Niu was only 11, she unluckily lost her right leg during the Wenchuan Earthquake.", "Niu has won lots of praise. This gives those who have prejudice（偏见）against the disabled a hit on the nose. “I was touched by something they said. They said the traditional view was that sports were for people with healthy legs, but sports should be a kind of spirit. Even though I have lost a leg, I still deeply love sports and will do so forever,” Niu said. Actually, Niu first drew the public’s attention when she completed a marathon—a 42.195-kilometer race in 2018, which was held in Wenchuan to mark the tenth anniversary（周年纪念）of the earthquake.", "Now, Niu works as a photographer and has more than 960,000 followers on social platforms, such as Douyin. “I feel I have a social responsibility to bridge the disabled and the public.Showing my life to the public can allow them to better understand our group and can also tell other disabled people that our society is more tolerant（宽容）than they imagined,” she explained."], "qs": ["1. What is Niu Yu now?", "A. A sports star. B. A singer. C. A model. D. A photographer.", "2. The audience suddenly ________ when NiuYu appeared on the stage.", "A. cheered B. clapped C. became silent D. laughed", "3. How old was Niu Yu when she lost her right leg?", "A. 24 years old. B. 11 years old. C. 10 years old. D. 4 years old.", "4. What does the underlined word “followers” mean in the last paragraph.", "A. Fans B.Dancers C.Photos D.learners", "5. According to the passage, which of the following is not true?", "A.Liu Yu became a shinning star for her confidence.", "B.Liu Yu has over 960,000 on the social platform.", "C.Liu Yu first drew the public attention in the Marathon in 2018.", "D.Liu Yu things that sports are people with health leg."], "qn": 5}, {"label": "第五篇", "title": "", "paras": ["Peng Shilu was born in a family of heroes in Haifeng, Guangdong in 1925. When he was less than five years old, his parents died. The young boy was taken care of and protected by the poor, and he moved between different families and lived a difficult life. The people’s kindness influenced him deeply at his early age.", "In 1940, Peng Shilu was taken to Chongqing. Later, with the help of the CPC (中国共产党), he went to study in Yan’an. In 1951, he went abroad to learn chemical engineering. When he completed his studies, he got an excellent grade.", "In 1956, Peng Shilu was asked, “Are you willing to change your research field?”", "“Of course, as long as the motherland has a need!” With the strong belief (信念), Peng Shilu began to study nuclear power (核能) at once. In the early 1960s, China’s development of nuclear submarines (核潜艇) was almost a “blank”. Peng Shilu and other scientists were learning, exploring and practicing. In 1970, China’s first nuclear submarine was built. In 1974, China became the fifth country in the world to have a nuclear submarine.", "Peng Shilu worked very hard. He spent all his life on nuclear power. “I have only done two things in my life. One is to build nuclear submarines and the other is to build nuclear power stations,” said Peng Shilu.", "He died on March 22, 2021, at the age of 96. As a pioneer in nuclear power, he is remembered by the people and the country. On March 3, 2022, he was named “Touching China’s Figure of the Year 2021”."], "qs": ["1. What influenced Peng Shilu deeply at his early age?", "A. The scientists’ spiritt B. The people’s kindness. C. The teachers’ words", "2. Why did Peng Shilu change his research field?", "A. The field was easier B. He wanted to be famous C. The motherland had a need", "3. When was China’s first nuclear submarine built?", "A. In 1970 B. In 1956 C. In 1940", "4. Which of the following best describes Peng Shilu?", "A. Honest and polite B. Humorous and strict C. Hardworking and selfless", "5. What’s the best title for the text?", "A. A Pioneer in Nuclear Power B. A Suggestion for Further Study C. A Study on the History of the CPC"], "qn": 5}, {"label": "第六篇", "title": "Time: J une 30th. 1948", "paras": ["Event: China’s fir st colour film Remorse at Death star ted filming.", "Yan Heming studied abroad and brought the most developed colour film making technology back to China. He invited Mei Lanfang, a great opera performer to act in this film and Fei Mu, a well-known director to direct the film. The film had great importance in exploring the road to colour film making in China.", "Time: J une 17th. 1984 Event: Chinese athletes attended the 7th Paralympic Games (残奥会) for the fir st time.", "24 Chinese athletes attended the 7th Paralympic Games. With the great effort from all of them, they won 2 golden medals, 12 silver medals and 8 bronze (铜制的) medals for China in total. Ping Yali won the first golden medal in the long jump event. Time: J une 7th. 2023 Event: Rocket car r ied 26 satellites (卫星) into space.", "China has sent a ZK 1A carrier rocket at the Jiuquan Satellite Launch Center in northwestern China to carry a total of 26 satellites into space, setting a new record for the most satellites sent by one Chinese rocket."], "qs": ["1. Who was invited in Remorse at Death as direct?", "A. Ping Yali. B. Fei Mu. C. Mei Lanfang. D. Yan Heming.", "2. How many medals did Chinese athletes win in the 7th Paralympic Games?", "A. 12 B. 14 C. 22 D. 10", "3. What do the three events have in common?", "A. They all set world records. B. They all happened in June.", "C. They all took place in Jiuquan. D. They are all about technology."], "qn": 3}, {"label": "第七篇", "title": "", "paras": ["Many artists draw with pens and brushes, but few “paint” with knives. Wang Jing, a woman from Shenyang, China, has given most of her time and energy to this art form for 27 years. In 1995, Wang got the idea by chance when she cut a piece of red paper using a knife and it left a white line. Then she believed that she might have created something out of common things. After that, using knives and paper, she completed a painting of a pair of birds.", "People usually “add” colors to create paintings, but knife painters use knives to “take away” colors on specially made coated paper. They use different pressure on the paper in different directions (方向) to create different colors. Once the marks are left on the paper, they cannot be covered, so it requires the painter to be completely lost in the work.", "Few people knew the great art form just after Wang created it. Besides, Wang herself was not expecting to make it something big at the beginning. But thanks to her love for the art form, she has kept painting for the past 27 years. So far, she has completed hundreds of paintings, and her favorite is a 2.8-meter-long painting. Wang said she would continue working in the field and make it known across the world."], "qs": ["1. What first made Wang decide to try knife painting?", "A. Knives and paper. B. The white line.", "C. The painting of birds. D. The red paper.", "2. How can knife painting be done?", "A. By drawing on paper with a pencil. B. By creating shapes with brushes.", "C. By cutting the paper with a knife. D. By pressing on the coated paper.", "3. What can be learned from paragraph 3?", "A. Wang hadn’t expected knife painting to be popular.", "B. Wang continued her work because of her family.", "C. Wang’s favorite painting work is 28 meters long.", "D. Wang said she might stop her work in the near future.", "4. Which of the following sentences can best describe Wang?", "A. Kill two birds with one stone. B. Where there’s a will, there’s a way.", "C. Two heads are better than one. D. When in Rome, do as the Romans do."], "qn": 4}, {"label": "第七篇", "title": "The Animal “Workers”", "paras": ["Jay, a 23-year-old man wearing an animal costume（戏服）, was giving out advertisement cards on the street. Jay was working so hard to make more people visit his store. Not only human society, but animal society also has such a group of animal “workers”. They either perform tasks, or dress themselves up, or just use their cuteness to bring in money for the company. For example, the Call Duck Café（柯尔鸭咖啡厅）draws the attention of a large number of tourists with Call Ducks’ cute appearance. Each duck interests a lot of guests every day. They can be touched or have their pictures taken with the guests.", "Owl（猫头鹰）Cafes have become popular in Japan in recent years. However, owls sleep during the day and are active at night. Making them work against their biological clock with be harmful to them.", "Many animals die because they are tired and full of fear. But there are still many people using their cuteness and life to make money.", "The aim of Animal Cafes is certainly to bring in more money but they should consider the well-being of these lovely animals. Please give these cute animals a right to “not work”."], "qs": ["1. What is the purpose of mentioning Jay in paragraph 1?", "A. To introduce the topic of the passage. B. To compare human society with animal society.", "C. To give information of Call Ducks. D. To describe an interesting story of animals.", "2. How do the writer talk about animals cafes?", "A. By giving numbers. B. By asking questions.", "C. By giving reasons. D. By giving examples.", "3. Which of the following words has the same meaning as the underlined word?", "A. Health. B. Luck. C. Wealth. D. Fashion.", "4. What is the writer’s opinion about animal “workers”?", "A. He doesn’t like them. B. He believes they are useless.", "C. He worries about their health. D. He thinks they should work harder."], "qn": 4}, {"label": "第八篇", "title": "", "paras": ["You can never imagine how crazy I was about football then. I used to play football until dark every day. But I unluckily developed a serious disease one day. Soon my mother rushed to me to the hospital and the doctor said that I needed to receive treatment in the hospital for some time. My dad often spent the night with me in the hospital while my mother looked after my sister at home. Then came the happiest moments when my father told me wonderful stories.", "My father was a talented storyteller. In the hospital, he would tell me a story or two. He copied sounds of bicycles or animals, so the pictures would never disappear from my mind. So happy was I that sometimes I wished to stay in the hospital a little longer. Because of my mom’s strict and careful care later, it became difficult to get well slowly. No longer sick, no more stories. Disappointed, I went into my father’s room one evening.", "“Dad, you tell me stories only when I’m sick.”", "My father laughed, “You are already eight and can read by yourself.”", "He handed me a book and said, “Go and read it. It will tell you stories.”", "That night, I opened the book and read the most interesting story I had ever read. Then I became thirsty for books and now I am a curious reader."], "qs": ["1. What was the writer’s life like before he was seriously ill?", "A. He received help from doctors. B. He liked reading very much.", "C. He used to play football every day. D. He played basketball with friends.", "2. What information can we get from the passage?", "A. The writer got well slowly. B. His father is good at telling stories.", "C. His mother is strict and never looks after him. D. The writer didn’t want to stay in the hospital", "3. Why did the writer’s father give him a book?", "A. His father didn’t like the book. B. His father thought he was well then.", "C. His father didn’t like telling stories any more.", "D. His father wanted to encourage him to read by himself.", "4. Which of the following can be the best title of the passage?", "A. How I Met Reading B. Why I Love Football", "C. How Time Flied D. Why Books Matter"], "qn": 4}, {"label": "第九篇", "title": "", "paras": ["Welcome to Global Friends! Come and find pen pals from all over the world.", "Alice Newman Age: 34/Language: English I am open-minded, living in Scotland. I love to travel but haven’t travelled much over the past few years. Last year I taught myself how to knit(编织). It is now one of my favorite hobbies.", "Dean Gill Age: 26/Language: French I’m a shy person. I love to write and draw. I’m now looking for someone who truly enjoys writing and drawing. We can share our goals, dreams and so on.", "Shirley Stacey Age: 19/Language: English Hi there! I am from Northern California in the US. I love hanging out with my family and listening to music. I also love reading. I am a bit shy with new friends. I am looking for a pen pal of my age."], "qs": ["1. On Global Friends, people can _______.", "A. learn about different sports B. go to concerts in different countries", "C. improve their cooking skills D. find pen pals from all over the world", "2. Last year，Alice Newman _______", "A. travelled widely B. made lots of new friends", "C. learned to knit by herself D. wrote many letters to her friends", "3. Both Gill and Stacey _______.", "A. speak English B. are shy sometimes", "C. are 19 years old D. live in North America"], "qn": 3}, {"label": "第十篇", "title": "", "paras": ["How was your sleep last night? Sleep is important for health. How can we have healthy sleep? Take a look at some advice. Wake up naturally Waking up to a ringing alarm is never fun. Studies show that when you get shocked by the alarm, your breathing will go up, your heart will have more beats and your blood pressure will rise.", "“This is a very unhappy way to start the day,” sleep scientist Whitney Roban said. “You’ll feel worse if you go back to sleep a few more minutes. It’s important to follow your body’s natural sleep—wake cycle (循环).”", "So what should we do? Try to use an alarm with softer and lower sounds. Or leave a crack(缝隙) in the curtains(窗帘)—the rising sun will wake you up.", "Sleep early and get up early Some young people may go to bed late and get up late, such as sleeping from 2 am to 10 am. They think as long as they have eight hours of sleep, everything will be fine.", "But in fact, our bodies can tell time. They use light and temperature to do so. If we wake up too late, our bodies might feel stuck between sleep and being awake. That’s why sometimes we feel even more tired after oversleeping."], "qs": ["1. According to studies, what will happen to your body if an alarm wakes you up suddenly?", "A. Your heart will beat faster. B. You may breathe more slowly.", "C. Your body temperature will go up. D. You will have lower blood pressure.", "2. Which of the following does Whitney Roban agree?", "A. Trying to use an alarm with louder sounds. B. Going back to sleep again after waking up.", "C. Reading magazines online before going to bed. D. Following the body’s natural sleep—wake cycle.", "3. What can we learn from the last paragraph?", "A. It is necessary for people to oversleep. B. Heavy work can lead to oversleeping.", "C. It is hard to change people’s sleeping habits. D. Oversleeping sometimes makes us more tired.", "4. What is the passage mainly about?", "A. Why people need to sleep. B. Why people have sleeping problems.", "C. How to have healthy sleep. D. How to wake up in a natural way."], "qn": 4}, {"label": "第十一篇", "title": "", "paras": ["As an artist, Pei Haozheng is well-known for paper folding. In his eyes, a piece of paper holds great possibilities. He can fold it into anything.", "He used his skills in his work, Deer with 100 Flowers(花生满鹿). It’s a deer with 100 flowers on its antlers(鹿角). Without cuts or glue, he used a piece of paper with side lengths(长度) of 2.22 meters to finish the whole work. As for the idea for the work, Pei said it came from a Chinese saying. It not only shows the wishes for Chinese young people to have a bright future, but also the deep love for our country.", "As a child, Pei learned folding from teachers and parents, and later he copied the patterns from books. Gradually, he was drawn into the paper world.", "For Pei, folding is an art that needs many skills. For example, it needs knowledge of math to make sure everything is in the right place, such as the different angles(角度) and the lengths of the creases(折痕). However, Pei thinks artistic beauty and exact folding are both important. Going too far with either won’t make good work.", "As an artist, Pei wants to tell the Chinese story through paper. “For me, paper folding is not just a special skill, but an art that can pass culture and last forever,” said Pei."], "qs": ["1. What do we know about Pei Haozheng’s work, Deerwith100Flowers?", "A. He used glue and scissors to finish it.", "B. He used 100 flowers to make a deer with his parents.", "C. It shows good wishes for Chinese young people and the country.", "D. It is made of some pieces of paper with the lengths of 2.22 meters.", "2. What is Paragraph 4 mainly about?", "A. How to learn math well. B. How to be a creative artist.", "C. What is less important for folding. D. What skills are needed for his work.", "3. What did Pei Haozheng say about paper folding?", "A. He used it to spread Chinese culture. B. It helped much to learn it earlier.", "C. He wanted to teach people the skills. D. It made him famous all over the world.", "4. What is the purpose of writing the passage?", "A. To explain why Pei’s work is so popular. B. To introduce a Chinese artist Pei Haozheng.", "C. To describe the development of paper folding. D. To express the writer’s love for Chinese tradition."], "qn": 4}, {"label": "第十二篇", "title": "", "paras": ["Recently, I went out to a bar with my friend Nicole. I didn’t actually know her well as we had only met once at a meeting. When I found myself in her town, we decided to meet up. Since we knew little about each other, we shared our stories, and she asked me many questions about my travels.", "When answering her questions about what I had learned in my travels, I told Nicole that travel had greatly improved my ability to “read” people and situations.", "“Oh? OK. Read my friends over there,” she challenged me.", "So I offered her my opinions about her friends and the other people in the bar.", "“How did I do?” I asked when I had finished.", "“Wow!” She was shocked.", "You might want to know how I was able to get those people right. For sure, I knew nothing about mind games. I judged(判断) their personalities simply by reading their body language, facial expressions, dress, and the way they talked with one another. I had travelled a lot before. When I was travelling, I couldn’t always understand what people were trying to say to me as most of them didn’t speak English. Non-verbal communication became very important. Whenever words failed, I depended on people’s facial expressions. By watching how people behaved, I tried to work out how they felt about something. The tone (音调) in people’s voices was quite helpful, too.", "The more I travelled and the more I talked with different people, the better I became at “reading” people. If you travel widely, you will be able to develop this ability, too."], "qs": ["1. What was the relationship between Nicole and the writer before their recent meet?", "A. They were close friends. B. They didn’t know each other well.", "C. They used to work in the same office. D. They often went to the bar together.", "2. How did Nicole feel after the writer had read her friends in the bar?", "A. Thankful. B. Nervous. C. Surprised. D. Uncomfortable.", "3. According to the article, how does the writer “read” people?", "A. By playing a clever trick on them. B. By surveying some of their friends.", "C.By having a short conversation with them. D. By studying their clothes, expressions and so on.", "4. What does the underlined word “non-verbal” mean?", "A. Taking place online. B. Not using words.", "C. Not writing English. D. Talking with strangers."], "qn": 4}, {"label": "第十三篇（四川 2022 A 篇）", "title": "A", "paras": ["Dear Mr. Brown, I know how disappointed you must be with my arriving late at our company's annual dinner last night. It is really un fortunate that it has happened and I offer you my most humble apologies.", "Please understand that the last thing I wanted to do was to be late and offend you and the guests from the Head Office. My explanation is a simple one. I had left the key at home when I went to work in the morning. As you know, I live with my mother. To the best of my knowledge,she has no plans to go out in the afternoon. But when her friends called her to play bridge, she went—completely forgetting that I ha d no key. Hence I was standing outside the apartment in despair and called her to come home quickly. But because of the traffic jam, she arrived home at about 7:30 pm, when I should be at the dinner. You will understand that no matter how fast I was in dressing up, I was sure to be late. Mr. Brown, please be assured that such a thing will never happen to me again.", "Yours sincerely, Bob"], "qs": ["1. The author was late for the company's .", "A. annual dinner B. New Year party", "C. annual meeting D. fancy dress party", "2. How did the author feel about being late?", "A. Humble. B. Regretful. C. Unfortunate. D. Disappointed.", "3. Which of the following is true?", "A. The author lost the key.", "B. The author's mother forgot her key.", "C. The author was held up in a traffic jam.", "D. The author was locked outside the apartment.", "4. When was the author supposed to arrive?", "A. At 20:30 B. At 19:00 C. At 19:30 D. At 20:00", "5. This is a letter of .", "A. praise B. apology C. complaint D. appreciation"], "qn": 5}, {"label": "第十四篇（2022 四川 B）", "title": "", "paras": ["A retired postman from Turkey and a beautiful white swan have been inseparable for nearly four decades, and the sto ry of their amazing friendship has melted the hearts of millions.", "When he spotted a wounded swan in a field, Recep had no idea that he was about to meet his best friend. He was in a car with a group of friends, when he noticed that the swan appeared to have broken wing.(72) He realized that leaving the bird there was the same as signing its death sentence, as it might be eaten by a predator (食肉动物) . So he took the bird home and started nursing it back to health. After recovery, the swan didn’t try to fly away. Instead, she befriended other animals on the farm, busy following her human friend around, either during his daily chores,or on his evening walks. Having no children, Recep regarded the s wan as his child and named herGarip. Now she has been with him for the last 37 years.", "“She comes when I call. she has never left me, not even during the river floods,”the retired postman said,“She used to be more vigorous, but she has grow n old now. If she dies, I will make her a nice grave her e.”"], "qs": ["36. Where did the man happen to see the swan?", "A. On the road. B. Over his farm. C. In a field. D. Under a car.", "37. What was wrong with the swan?", "A. It was lost. B. One leg was hurt.", "C. It was sick. D. One wing was broken.", "38. What can we learn from the text?", "A. The swan is treasured by Recep. B. Recep is working in the post office.", "C. The swan flew away after recovery. D. Recep met his best friend in the 1990s.", "39. What does the underlined word “vigorous”in the last paragraph mean?", "A. Powerful. B. Energetic. C. Friendly. D. Beautiful.", "40. Which can be the best title for the text?", "A. Man and Animals B. A Retired Postman", "C. A Swan Named Garip D. Friendship with a Swan"], "qn": 5}, {"label": "第十五篇（四川 2023 B 篇）", "title": "", "paras": ["I recently had to give feedback(反馈) to a junior colleague after noticing some errors in a project we worked on together. My first thought was to fix them myself and move forward. But my manager said,“Well, Lucy, why not treat it as a teaching opportunity?”", "It took more than a week to schedule the meeting, and even after I did, I kept moving it back.Delivering negative feedback to my team member sounded fearful. Minutes before the actual call,I felt heavy in my chest.", "The reason these conversations feel so difficult for me is my social anxiety. When faced with the choice of argument or avoidance, I almost always choose the latter. While I understand objectively that feedback is necessary, my inner voice says that sharing anything negative will result in conflict. In this situation, I assumed my colleague would get upset or react defensively. I imagined us reaching deadlock instead of a solution.", "Here's what actually happened: I told my colleague I'd noticed some errors in our project and had corrected them. To avoid these kinds of errors in the future, I suggested we create a system to quality-check each other's work. Thankfully, my colleague listened calmly and told me he wished I had raised my concerns earlier so that we could have troubleshooted the issue together. It was a learning moment for both of us. We spent the next 30 minutes brainstorming solutions.", "Giving tough feedback is an art—and a difficult one at that. Different people often require different approaches, depending on your relationship and the power dynamics involved. Despite these aspects, however, all feedback should be delivered thoughtfully and with the intention of helping others improve."], "qs": ["1.What did Lucy's manager do?", "A. The manager corrected the errors for her colleague.", "B. The manager asked her to correct the errors by herself.", "C. The manager taught her how to avoid making errors in the project.", "D. The manager advised her to help her colleague learn from the errors.", "2. What is Lucy's problem?", "A. She has social anxiety.", "B. She often has conflict with people.", "C. She usually makes her colleagues upset.", "D. She has trouble finding solutions to problems.", "3.What actually happened at their meeting?", "A. They discussed how to raise concerns in the project.", "B. They communicated smoothly about their work.", "C. They criticized each other for the errors.", "D. They corrected the errors together.", "4.The text is mainly about .", "A. how to finish tough projects B. how to give negative feedback", "C. how to correct colleagues' errors D. how to avoid conflict at workplace"], "qn": 4}, {"label": "第十六篇（四川 2023 C 篇）", "title": "", "paras": ["For decades, not having a college degree has often been a barrier for workers seeking higher-level, better-paying jobs. But more employers are now saying they're willing to hire them.", "College degrees were used by companies as an indicator of skills and competence when they evaluated potential hires—making it very difficult for non-degreed workers even to be considered.The majority of US workers have had to cope with that barrier. Only 37.7% of Americans aged 25and up had a bachelor's degree(学士学位) in 2022, according to the US Census Bureau.", "But employers are now——at least publicly—becoming more open to the idea of skills-based hiring, which focuses on the job candidates' competence and capacity to learn new skills rather than on their educational background. Why the change of heart? There are several factors. But above all things is a population reality: The falling US birth rate will produce fewer workers in the years ahead to replace the number of workers to retire.", "Additionally, employers are increasingly aware that the skills needed to do many jobs don't necessarily require a four-year degree, and that competent workers can be trained in needed skills as they arise.", "Some companies are now investing billions of dollars to build new chip factories here—creating tons of thousands of jobs, many of them paying over $100,000 a year, and don't require a college degree.And businesses and high schools will be connected more closely so that students can get hands-on experience and a path to a good-paying job."], "qs": ["1.What can be inferred from paragraph 2?", "A.Employers are willing to hire non-degreed workers.", "B.The US Census Bureau has to cope with the barriers.", "C.Most American workers don't have a bachelor's degree.", "D.About 37.7%of Americans have no professional competence.", "2.Employers used to focus on job candidates'______.", "A.creative skill B.work experience", "C.business capacity D.educational background", "3.What is the main factor for “the change of heart”in paragraph 4?", "A.The retiring age. B.The higher birth rate.", "C.The population reality. D.The better job training.", "4.The cooperation between businesses and schools can_", "A.attract investment in new chips", "B.prepare students for a good college", "C.encourage factories to create more jobs", "D.help students acquire practical experience"], "qn": 4}, {"label": "第十七篇（2024 安徽 A）", "title": "", "paras": ["Catching fish from oceans, lakes and streams is not only the most popular but probably the oldest pastime pursued b y human beings. Thousands of years ago, people caught fish in net s and traps. They also fashioned hooks from bones an d stones.Taking fish with net s for food is called commercial fishing. Fishing with a hook and line for fun is called sport fishing.", "Perhaps the greatest appeal in fishing for fun is the opportunities it offers to get outdoors to enjoythe company of fr iends and to use new and various skills to catch the fish.", "In fishing, a set of ethic exists based on consideration for others. One job is to take no more fishthan one needs. S ome of the best fishers catch fish for the spirit of it and then release them unharmed for some else to catch. The sport m ethods a person used in catching fish and the consideration shown for others while fishing are the marks distinguishing a true fisher."], "qs": ["1. Catching fish with nets for food is called .", "A. sport fishing B. a pastime C. commercial fishing D. netting", "2. What is the most attractive about fishing for fun?", "A. A chance to get traps. B. A chance to get outdoors.", "C. An opportunity to explore oceans. D. An opportunity to fashion hooks.", "3. A true fisher is partly distinguished by .", "A. catching as many fish as possible B. going fishing alone", "C. using sporting methods in catching fish D. buying fishing equipment", "4. The major aim of sport fisher is to .", "A. move from place to place B. making money", "C. catch fish for food D. fish for fun", "5. What does the author tell us about fishing?", "A.It is costly B. Anyone can enjoy it.", "C. women hate it. D. It is a new way of relaxing."], "qn": 5}, {"label": "第十八篇（2024 陕西 A）", "title": "", "paras": ["Tea and coffee are two of the most popular drinks in the world. However, people usually like one more than the othe r. These drinks also have very different uses.", "Tea drinking started in China over 4,000 years ago. Tea is made from leaves. These days, some people drink tea for health, using it to help with stress or losing weight. However, most people in tea-drinking countries think of tea as more than just a healthy drink. In fact, tea drinking in some countries is a part of the culture. In Turkey, tea is always there when people meet. Whether in someone's home or a com pany, tea is always offered as a way of welcome. In the UK, homes and offices usually have tea time. Tea and other dis hes are served at tea time in the afternoon. It is a way of relaxing with friends or co-workers. Coffee came much later than tea, just over 1,000 years ago. Coffee is made from beans.Something in the coffee beans makes a person feel active. Most people do not drink coffee to relax. Instead, they drink coffee to get going. Many people drink coffee in the morning to help them wake up. Others will also drink coffee during short breaks in the afternoon to keep going through the working day. Some people may visit coffee shops just to meet and talk with friends.However, manypeople in coffee s hops drink coffee while working on their computers.", "Which do you like to drink more, tea or coffee?"], "qs": ["1. Where did tea drinking start?", "A. In Japan. B. In China. C. In Turkey. D. In the UK.", "2. We can learn from Paragraph 2 that people in the UK", "A. drink tea to get fat B. offer tea to say goodbye", "C. think of tea as a bad drink D. have tea to relax themselves", "3. What is coffee made from?", "A. Leaves. B. Sugar. C. Dishes. D. Beans.", "4. Which of the following is True according to Paragraph 3?", "A. Coffee came much earlier than tea.", "B. Many people drink coffee to sleep.", "C. Many people play computer games in coffee shop", "D. Some people meet and talk with friends in coffee shop", "5. What is the best title of the passage?", "A. The Uses of Tea and Coffee B. The Prices of Tea and Coffee", "C. The Smells of Tea and Coffee D. The taste of Tea and Coffee"], "qn": 5}, {"label": "第十九篇（2024 陕西 C）", "title": "", "paras": ["There is little doubt that house cat first developed naturally from ancient wild cats. The cleverest relative is the Ameri ca wild cat which still lives in Africa today. This is understandable because the first house cats came from Africa.", "Cats first started to live around people in Egypt about 6, 000~7,000 years ago. From Egypt,cats started to move aroun d the world. This is about the same time that Egyptians began storing grain( ) in buildings. Scientists used to believe 谷物 that people tamed cats to catch mice and protect the grain. However, cats don't like to be told what to do! Now, scientists believed that cats followed the mice and learned to accept people. Finally, some of the cats began to grow comfortable around people, these were smaller cats that needed protection. As these cats and people got used to each other, then they moved in together. Around 5,000 years ago, cats started to live with people.", "Soon cats were in Greece, then the Middle East and China. They moved along Egyptian business roads keeping away mice and keeping people around them. After the Romans came to Egypt, they also accepted the cats and brought them to Europe. These cat likely bred( ) with other cats to form the many kinds of house cats we have today. 繁殖 Cats are relatively recent house animals. House cats still have a lot in common with their wild relatives. Cats sleep a lot to save energy just like wild cats. They will often get food at night as well. House cats are generally peaceful and friendly, but be careful! If a cat feels it is in danger, it will fight back-just like a wild cat."], "qs": ["1. Where did the first house cats come from?", "A. Asian. B. Africa. C. Europe. D. America.", "2. When did cats start to live with people?", "A. About 4,000 years ago. B. About 5,000 years ago.", "C. About 6, 000 years ago. D. About 7,000 years ago.", "3. According to the text, which of the following is TRUE?", "A. Cats started to move around the world from China.", "B. Cats get food at night to save energy like wild cats.", "C. Cats have a little in common with their wild cats.", "D. Cats were accepted and brought to Europe by Romans", "4. What does the underlined word“save”mean in Chinese?", "A. B. C. D.", "节约 除了 救助 消耗", "5. What does the text mainly talk about?", "A. The development of house cats. B. Different cats in different countries.", "C. The relationship between cats and people. D. The differences between house cats and wild cat"], "qn": 5}, {"label": "第二十篇（2024 安徽 C）", "title": "", "paras": ["Stonehenge(巨石阵)is an ancient monument of huge stones standing on the great Salisbury Plains(索尔兹伯 里平原)in England.It was constructed before 2000 BC,but exactly why it was built is still unknown.Local residents said it was once built as a healing center,a place where people went to try to get better.However,some scientists believed that Stonehenge was just built for religious purposes.", "As the most enjoyable historic remains on Earth,Stonehenge has grabbed people's attention for centuries.The mystery of these blue stones is that they are only found in the Brescelly Mountains in south Wales,nearly 150 miles away. It was a huge job to transport these stones from Wales,because originally there were about 80 of them weighing up to four tons each.The stones were brought by boat from the mountains and pulled from the coast by sledge to the site.It needed at least 150 people,simply to move one of these stones.However,building Stonehenge was much more complex.It was not us simply one stone piled on top of another;they were joined together. After nearly 5,000 years Stonehenge is sill standing.Though many of the stones have fallen,Stonehenge sill attracts nearly five thousand tours every day.We now know how it was built.However,the question“why” is a bit problematic. Nature may know all the answers well but science has yet to prove its theories.It seems that Stonehenge isn’t ready to disclose all its secrets to human beings just yet."], "qs": ["1. What is the passage mainly about?", "A. The purpose of Stonehenge B. The origin of Stonehenge", "C. The appearance of blue stones D. The weight of blue stones", "2. What does the author talk about in the second paragraph?", "A. The power of blue stones B. The power of Stonehenge", "C. The reason for transporting blue stones D. The way of fetching water", "3. It is a local belief that Stonehenge was possibly built .", "A. without a motive B. as a holy place", "C. with the use of wheel D. for health", "4. Where was Stonehenge built?", "A. In Wales B. In Preseli Moubtains", "C.250 miles from ancient England D. On Salisbury Plain", "5. How the blue stones of Stonehenge were transported .", "A. is not known B. was explained", "C. was recorded D. is not hard to find"], "qn": 5}, {"label": "第二十一篇（2024 陕西 D）", "title": "", "paras": ["Times change! The day I heard that the Bright Bookstore was closing, I was sad. The bookstore had been in the neighborhood for 50 years, and it was a great place where people could connect throug h their love of books.", "When I met Old Tim, the store's owner, he told me it was difficult to run( ) a traditional book 运营 store. Most young people preferred reading e-books and more people bought books online.Childhood me mories came back to me so clearly. A group of us kids often went to the store. We looked at the new books, or just talked with Tim. We spent hours reading there. Tim encouraged us to share our ideas by writing them on a large board.", "A few months later, I was back and was surprised to see that the Bright Bookstore was still open for business. It was still old, but inside it was like a different world. In an area, a book reading was going on. Nearby, some readers were sharing their ideas on a screen instead of the large board. Some were reading on computers. It even had a coffee shop selling nice food.Clearly, the Bright Bookstore wa s in good, creative hands.", "Tim told me that there were more opportunity events in the coffee shop such as book readings and even concerts and movie nights. The bookstore was turned into a place where the book lovers got toget her and shared ideas and experiences.", "“ well, as you can see, technology and creativity have brought my old bookstore into 21st century! I'm glad to see that everything I wanted it to offer to the community is still here.” said Tim. No matter how times change, there are always people who love reading. With the development of technology, traditional bookstores should also change into a creative way."], "qs": ["1. What made the writer sad about the old Bright Bookstore?", "A. It was closing B. No people read there", "C. It moved to another place D. No people bought books there", "2. Why did the writer miss the old bookstore?", "A. Because he had a good time working there", "B. Because the owner often read stories to him.", "C. Because it brought him back to the good old days.", "D. Because he often drank coffee there.", "3. How was the bookstore different a few months later?", "A. The book reading area has gone B. The kids played computer games there", "C. People shared ideas easily on the board. D. The coffee shop there sold nice food.", "4. What did Old Tim want the bookstore to offer?", "A. A way for the neighbors to sell food B. A chance for the kids to show their skills.", "C. A place for the book lovers to read and share. D. A board for the kids to draw pictures on.", "5. The writer wants to tell us that .", "A. E-books will take the place of paper books. B. There are few people who like reading now.", "C. People like to watch movies in the bookstore. D. Traditional bookstores should change creatively."], "qn": 5}, {"label": "第二十二篇（广东 2023 B 篇）", "title": "", "paras": ["The first forest library in Shanghai recently opened in public. Known as Read &amp; Joy Forest, the l ibrary was jointly founded by Pudong New Area and Shanghai Library. It is located in an urban wood, covering an area of 20,546 square meters.", "The design of forest library allows an environment-friendly principle——ensuring minimum disturba nce to nature,with existing green spaces connected by wooden walkways.", "The library is in open air and equipped with facilities such as benches and an information booth. Visitors can read and relax in a natural environment. It allows visitors to take a pleasant walk in the q uiet forest, which includes osmanthus.", "“I learnt about the forest library from my friends, so I came here,”said a 21-year-old college stude nt, Mr Wang.“The green outdoor environment helps reduce eyestrain. I will come back for sure.” Having a library in a wood is an extension of reading indoors, according to Xu Qiang, who work s in Shanghai Library.“It offers a different reading experience to readers,”he added. Most of the visitors to the forest library are young people and parents with kids. They are really i mpressed by the fresh air and the pleasant smell of green trees. Since most of the time they stay indo ors, this special library makes it possible for them to get close to nature surroundings. They feel really relaxed there."], "qs": ["1. The environment-friendly principle focuses on .", "A. increasing green spaces", "B. making the least change to nature", "C. reducing disturbance to readers", "D. creating a relaxing indoor environment", "2.What do we know about“osmanthus”in paragraph 3?", "A. It is a plant. B. It is a path. C. It is a bench. D. It is a device.", "3.What does Xu Qiang think of the forest library?", "A. It appeals a lot to parents and kids.", "B. It provides a new reading experience.", "C. It enlarges the indoor reading space.", "D. It helps reduce reader's eyestrain.", "4.The forest library is special because it .", "A. offers people a chance to read in nature", "B. attracts a large number of readers", "C. has support from the local government", "D. covers a large area of forest", "5. Where is this passage most likely from?", "A. A diary. B. A handbook. C. A newspaper. D A novel."], "qn": 5}, {"label": "第二十三篇（2023 广东 A 篇）", "title": "", "paras": ["Welcome to Green Village Community! Here is some information for the newcomers about the sports and fitness facilities in this area.", "Power Station Gym This gym is well known in the area. Here you can find a newly-built swimming pool and the latest fitness equipment. It has a team of skilled trainers that can provide personal training. Please note that the swimming pool is closed for cleaning every Sunday and it is not open to the public. Zest-booster Leisure Center This is the largest leisure center in the area and it is open 24 hours a day. It is a perfect choice for people who need a flexible workout schedule. It has a 400-meter running track that is free to use for members. It provides specially designed fitness programs for VIP members. It is open six days a week and closed on Mondays.", "Wonder Ladies Club This club is for female members only. It has a mode m gym with the newest equipment. It offers one-to-one training and programs that best meet females’ needs. It also organizes club events such as lectures on healthcare and member gatherings where you can get to know other club members over a cup of coffee and snacks.", "Josh’s Running Club This is a club organized by Josh Smith, a professional running athlete. He leads a five-kilometer run every Tuesday and Friday evening, starting at 9 o'clock. You don't have to become a member or pay anything to run with the club. Just come and meet other runners at the main gate of Green Village Park.", "Papa and Mama’s Health and Fitness This center welcomes anyone above the age of 60 who wants to improve his or her fitness by doing some regular and easy exercises. You can surely find the support you need to achieve your goal s. It has a team of super friendly.personal trainers of yoga, dancing etc. Currently they are offering prog rams to non-members free of charge, every Monday morning."], "qs": ["1. At Power Station Gym, you can .", "A. attend member gatherings B. have coffee and snacks", "C. use a running track for free D. swim in a new pool", "2. Which of the following people who need a flexible workout schedule?", "A. zest-booster Leisure center B. wonder Ladies’ club", "C. Josh's Running club D. Papa and mama’s Health and Fitness", "3. Wonder Ladies Club provides .", "A. VIP fitness programs B. health care lectures", "C. swimming courses D. running classes", "4. Who set up Josh's Running Club?", "A. A wonder lady B. An old couple", "C. A professional athlete D. A fitness trainer", "5. Who are the target customers of Papa And Mama’s Health and Fitness?", "A. Swimming athletes B. Young mothers", "C. Running lovers D. Elderly people"], "qn": 5}, {"label": "第二十四篇（2024 贵州 B）", "title": "", "paras": ["One out of many important things for the whole family to do is to have dinner together. Researchers began reporting the benefits of family dinner about a decade ago, focusing mainly on how it affects children. Studies show that those families who eat dinner at least 3 or 4 times a week together, benefit in many ways. Eating together helps families achieve open communication and build stronger and healthier relationships. Children have better grades at school and are better adjusted as teens and adults, and the entire family enjoys healthier nutrition. For many families, eating dinner together proves to be a good and effective way to reduce the risk of youth rates of addiction, and helps to raise healthier children. It is also a great time to share the events of the day, discuss news and ideas and just be together and enjoy each other's company.", "During dinner time parents have better opportunity to show that they are the prior to their children. Sitting at the same table and sharing meals is where and when parents can find out more about their children's school performance, daily activities and attitudes towards life. When parents have all this information they can better direct their kids towards positive things in life. They also have better chance to reduce the possibility that children will get involved with alcohol, tobacco, and illegal drugs.", "However, family researchers say that the benefits of family dinner by no means can be considered as automatic. Parents can sit down to dinner with their kids every day and achieve nothing. Family dinner may not benefit if there is too much arguing going on, if there is no meaningful conversation or, what is even worse, if there is just plain silence during gathering."], "qs": ["1. What is the focus of researchers’ report on the benefits of the family dinner?", "A. The effect of family dinner on the society. B. The effect of family dinner on school.", "C. The effect of family dinner on children. D. The effect of family dinner on parents.", "2. How could families benefit from dinning together?", "A. Families relationships would be stronger. B. Families dinning time would be longer.", "C. Children's school performance would be worse. D. Families would drink more alcohol.", "3. What information should be got before parents positively direct their children?", "A. Parents’ attitudes towards life. B. Children's attitudes towards life.", "C. The time for family dinner. D. The food for family dinner.", "4. Which one is not suggested during family dinner time?", "A. Talking about children's activities. B. Learning about the students’ homework.", "C. Discussing news and idea. D. Arguing each other a lot.", "5. What does the author imply in the last paragraph?", "A. All family dinners can be benefits. B. Plain silence could be help at family dinner.", "C. Meaningful conversations are essential at family dinner.", "D. Family gathering for dinner is a must."], "qn": 5}, {"label": "第二十五篇（2024 贵州 D）", "title": "", "paras": ["One of the reasons I became a teacher was how much I loved the reading and writing process, and how excited I was to help young children develop as readers and writers. One day、I discovered a work of Vivian Paley, who developed a storytelling curriculum( 课程 ) for young children, which involved writing down the contents of students ’drawings and having their classmates act out these stories. I was immediately drawn to Paley's focus on drama.", "One morning, as my students gathered in our classroom for our writing lesson, I told them that they could draw anything they’d like, imaginary or real. They discussed with one another what they liked to draw and some shared their ideas loud, which helped inspire those who weren't ready with their own ideas. For the next half hour or so, I observed that even my most hesitant and unwilling students were drawing with a sense of concentration and purpose.", "Later, we sat in a circle and I explained that we would act out some of their stories. The writer would choose classmates to be the characters in the story, and I would tell the story. Then a student stood up to announce which characters she’d need. I watched as one student played a rabbit, another played a fairy, and another played a rainbow cloud. When the play was over, the actors and the “director” bowed, and the class clapped for them. The next “director” jumped to her feet, shouting, “My story is the next!”.", "After I taught in this way, my students began to write down their own stories, though I always provided aid in the writing process when they needed. The goal of these lessons is not to turn my students into fluent writers in kindergarten but to provide them with the chance to become writers, to see themselves as storytellers, and to experience the magical feeling when their ideas come to life."], "qs": ["1. What does Paley's curriculum mainly ask students to do?", "A. Tell stories. B. Draw pictures. C. Act out stories. D. Listening to stories", "2. What encouraged the inactive students to start to draw?", "A. Other students’ ideas. B. The author's instruction.", "C. The inspiration from books. D. Their experience of painting.", "3. Who is responsible for choosing acts?", "A. the teacher B. the reader C. the writer D. all the students", "4. How did the students eventually feel in that morning's class?", "A. Confused. B. worried. C. Relaxed. D. Interested.", "5. Which of the following statement is true according to the passage?", "A. Give them a chance of becoming a writer", "B. The author always provides stories children need.", "C. The author expected to link magical feelings with reality.", "D. The goal of these lessons is to turn my students into fluent writers in the kindergarten."], "qn": 5}, {"label": "第二十六篇（2023 贵州 D）", "title": "", "paras": ["Most companies expect IT (Information Technology) managers to head an IT staff of computer technicians. But IT managers can also specialize in other areas. Some managers may also be responsible for keeping their company's Internet safety. They protect both their company and their online customers from thieves. Other managers focus more on the business rather than the technical part of computing. They become project managers, helping companies reach as many online customers as possible.", "Some companies also look for IT managers who can act as trainers. These trainers help a company's computer technicians keep up-to-date on computer skills.", "Most companies require their IT managers to have both a bachelor's degree and some experience in the computer field. Often, companies hire IT managers out of their existing staff of computer technicians. Since IT managers are extremely important to companies’ success, it’s no surprise that they receive such high salaries- around US $56,000 a year to start with. And, in such a fast-changing field, managers’ salaries usually increase after only a couple of years.", "The world will be watching to see just how quickly e-commerce replaces the old ways of doing business. And as computers change the way the world does business, IT managers will be in the middle of it all. Few companies can survive without them."], "qs": ["1. Besides being the leader of computer technicians. IT managers are also expected to be .", "A. online safety specialist B. skilled IT workers C. training assistants D. salesmen", "2. The word“reach”probably means .", "A. understanding B. get in touch with C. knowing D. arriving at", "3. Why do employers pay high salaries to IT managers?", "A. Because they work longest hours B. Because they are excellent leaders", "C. Because they help improve the company's product D. Because they are key factors to their success", "4. According to the passage . companies often look for IT managers? .", "A. within the company", "B. among the employed staffs their own professionals", "C. their own professionals", "D. from outside the company", "5. This passage is mainly about .", "A. the high salaries IT managers earn", "B. the important role IT managers play in a company", "C. the qualification IT managers obtain", "D. the advantages IT managers should have"], "qn": 5}, {"label": "第二十七篇（2024 河南 D）", "title": "", "paras": ["Aksu in the Xinjiang Uygur autonomous region is making efforts to optimize the use of water resources by building a world-class reservoir project, which aims to reduce droughts and floods and reduce their influence on local economic development and people's livelihoods, as well as generate power.", "Located at the junction of Wensu and Wushi counties of Aksu, the Dashixia water reservoir project started construction in December 2017, and is expected to test its water-holding function in October 2025 and finish all construction around October2026.", "To better monitor the quality of construction work and collect construction data, the company channeled around 30 million yuan ($4.1 million) to build a smart monitoring system in late 2021.", "\"The application of the system can not only help us save human resources, but reduce the risk of human errors. We can monitor the construction work during the whole process,\" said Li Jiandong, the company's director of technology management department.", "\"For example, we can trace the whole process of dam material from the original mining, transportation and its placement through the system.\" He added that the system is in trial operation so far, and will be put into service around October to December.", "Seeing the project in smooth operation, the 45-year-old Xu Shumei, a senior technician from the company, feels her efforts and contributions are rewarded.", "“I've worked in Xinjiang since 1999 after finishing my education in Chongqing, my hometown. And I started to work for the project around four years ago,\" she said.", "She is responsible for quality control, laboratory management and energy saving and emission reduction for the project.", "I've never regretted serving in this industry, and it may be a once-in-a-lifetime chance to get involved in such a world-class project. But I owe a lot to my daughter and parents who need my care because of my work,\" she said."], "qs": ["1. Which is not the purpose of building a world-class reservoir project in Aska?", "A. To reduce droughts B. To reduce floods", "C. To generate power D. To reduce power generation", "2. When is the Dashixia water reservoir expected to finish all construction?", "A. Around December 2017 B. Around late 2021", "C. Around October 2025 D. Around October 2026", "3. How did the company better monitor the quality of construction work?", "A. To manage laboratory energy B. To build a smart monitoring system", "C. To protect the right of laborers D. To prohibit the risk of human errors", "4. What can you infer from this passage?", "A. Xu Shumei is a junior technician in charge of quality.", "B. Xu Shumei take less care of his daughter and parents.", "C. Xu Shumei is a workaholic in eyes of her relatives.", "D. Xu Shumei has been the company director for 4 years.", "5. What is the passage mainly about?", "A. The Dashixia water reservoir can generate power.", "B. The Dashixia water reservoir can reduce drought.", "C. The Xinjiang reservoir can reduce energy and emission.", "D. The Xinjiang reservoir is trying to optimize water resources."], "qn": 5}, {"label": "第二十八篇（2024 黑龙江 A）", "title": "", "paras": ["Man has three basic needs: food, clothing, and shelter. If a man lives in a warm climate, clothing is not absolutely necessary. However, man cannot live without food, and, he has little chance of survival without shelter. Mankind needs shelter to protect him from the weather, wild animals, insects, and his enemies. Long before man learned how to build houses, he looked for natural shelters, as the animals did. He found that he could protect himself by climbing up into trees or by crouching under the over-hanging edges of cliffs, or by crawling into caves. The first shelters or homes actually built by man were very simple. For his building materials, he used what he could find easily around him; rocks, tree branches, dried grasses,animal skins... It was a long time, however, before man began to build permanent(永久的) shelters because, until man learned to farm, he lived by hunting. And, in order to follow game, he had to be able to move from one hunting ground to another. Thus, the first man-made shelters were those that could be easily transported.", "The first permanent shelters were probably built twenty to forty thousand years ago by fish-eating people who lived in one place as long as the fish supply lasted. Fish-eaters could stay in one place for several years. However, once man learned to farm, he could live longer in one place. Thus, he was able to build a permanent home. Once again, he built his home with the materials he found at hand."], "qs": ["1. Which of the following is NOT true according to the passage?", "A. Without food, man will not survive.", "B. People cannot go without clothing.", "C. Shelter is a protection from danger.", "D. Man used to be like animals to some extent long time ago.", "2. Which of the following materials is NOT mentioned in this passage?", "A. Bricks. B. Grasses C. Wood. D. Animal skins.", "3. According to this passage, we learn that long before man built permanent homes, they lived by .", "A. farming B. hiding in caves C. hunting D. fishing", "4. The first man-made shelters must be easily transported because the hunters .", "A. were often threatened by animals B. often moved from one hunting ground to another", "C. didn't like permanent houses D. often changed their jobs", "5. The first people to have permanent shelters were probably .", "A. hunters B. farmers C. fishermen D. none of the above"], "qn": 5}, {"label": "第二十九篇（2024 河南 A）", "title": "", "paras": ["More young people in China are looking to frugal, low-cost lifestyles in order to spend less and save more. In following a trend adopted by their counterparts in many other countries, they are beginning to realize and reject the pitfalls of consumerism, believing that simplicity can bring happiness and satisfaction, experts said. Economic and employment pressures, as well as changing perceptions toward material life, are also resulting in more young people turning their backs on extravagance and waste in the post-pandemic era, the experts added.", "Frugality is being practiced in a number of ways. Some young people opt for discounts and low-priced goods, while others are replacing well-known brands with those that are cost-effective. Some are cautious when buying nonessential items, while others say they save all they can in order to make important purchases. \"In middle school, I only used to buy major brands. Then, I realized that a piece of clothing, regardless of whether it is from a well-known brand or not, may only be worn for one or two years. So, eventually I felt it was unnecessary to buy brand names. As long as the clothes are suitable to wear, this is fine,\" He said. \"Besides, the quality of famed brands sometimes is not as good as that of ordinary ones.\" He, who is studying economics, said his pursuit of frugality stems from the idea of \"realizing maximum happiness through minimum expenditure\".", "The student added, “As luxury food and brand-name clothing cannot increase my happiness, why not satisfy myself by spending less for the same amount of happiness?\""], "qs": ["1. According to the passage, what lifestyle are more young people expecting to live?", "A. Plain needy lifestyles B. Rich high-cost lifestyles", "C. Simple low-cost lifestyles D. Extravagant pleasant lifestyles", "2. What do “they”(P2, L1) refer to .", "A. more young people in China C. more young people in any other countries", "B. more young people in every country countries D. more young people in many other countries", "3. Which is not the reason for more young people expecting a frugal life?", "A. Rich and wealthy life C. Employment pressures", "B. Economic pressure D. Changing attitudes toward material life", "4. How many ways of frugality are there being practised in the passage?", "A.2 B.3 C.4 D.5", "5. What is the passage mainly about?", "A. More young people are in pursuit of happiness and satisfaction.", "B. More young people never buy luxury food and brand-name clothing.", "C. More young people have changed their attitudes toward consumerism.", "D. Frugal, low-cost lifestyles only attract a growing number of foreign followers."], "qn": 5}, {"label": "第三十篇（2023 四川 D）", "title": "", "paras": ["People using happy emojis(表情符号) may seem cheerful—but are they really happy? Researchers from the University of Tokyo wanted to investigate whether “display rules” —— “socially appropriate facial expressions in a given situation”—existed in communications with emojis. The study saw about 1. 289 volunteers from Japan using emojis in response to online conversations. The participants, most of whom were female and aged 11 to 26 years, self-reported the intensity of emotional expressions. Results suggested that happy emoji s were often used to make negative emotions and“manage the expression”to make a message seem more positive. Negative emojis, such as any of the sad face emojis were only used when the participation felt very strong negative feelings.", "Experts found that people were most likely to use positive emojis when they were feeling negative emotions or when talking to people of higher status, but they were also less likely to express emotions through emoji s toward this group of people. People were more likely to use accurate emojis to express their feelings when talking to close friends. “As online socializing becomes more popular people have become accustomed to modifying their expressions and examining the appropriateness of their communication” Moyu Liu. An emotional behavior expert at the University of Tokyo who led the research, said “However, I realized that this may lead us to lose touch with our real emotions.”"], "qs": ["1. What did researchers from the University of Tokyo want to find out?", "A. How to use emojis to express our emotions properly.", "B. When to make facial expressions socially appropriate.", "C. If the display rules of facial expressions existed in communicating with emojis.", "D. Whether happy emojis were used to mask negative emotions in communications.", "2. What do we know about the participants of the research?", "A. They were mostly female.", "B. They were in their early twenties.", "C. They were asked to report with emojis.", "D. They were selected from the University of Tokyo.", "3. When the participants had very strong negative emotions, they .", "A. used happy emojis B. masked their feelings", "C. modified their responses D. chose negative emojis", "4. People were more likely to use accurate emoji s when .", "A. they felt a little sad", "B. they chatted with close friends", "C. they needed to make a message more positive", "D. they communicated with people of higher status", "5. According to Moyu Liu, what might be the negative influence of this trend?", "A. We will be out of touch with our real friends.", "B. We will fail to manage our facial expressions.", "C. We will spend too much time socializing online.", "D. We will lose the ability to express our true feelings."], "qn": 5}, {"label": "第三十一（2023 河南 D）", "title": "", "paras": ["Science fiction has suddenly become popular since the 21st century. Before the year 2000,Chinese science fiction was known to only a small number of people in China. Few works were translated, and the Western world had little taste for it. But the once sub-genre has become internationally recognized, mainly because of Ken Liu, a writer, translator and computer scientist.Ken Liu has done more work than anyone else to translate Chinese science fiction. However, his and the genre's defining moment was Liu Cixin's novel called The Three-Body Problem, a mind-boggling, hard science fiction. When Ken Liu translated The Three-Body Problem, it became the first contemporary Chinese science fiction novel in English. Published in 2014, it proved to be a big success.", "Of course, writ
