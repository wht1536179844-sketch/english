<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>中考词汇 · 七天艾宾浩斯打卡本</title>
<style>
/* ===== 练习本设计令牌 ===== */
:root{
  --paper:#FBFCF6;
  --grid:#DDE8D8;
  --line:#A8C4A0;
  --ink:#22303A;
  --ink-soft:#5A6B76;
  --red:#D2402F;
  --red-soft:#F6DAD5;
  --marker:#FFE27A;
  --card:#FFFFFF;
  --radius:10px;
  --serif:"Iowan Old Style","Palatino Linotype",Georgia,"Times New Roman",serif;
  --sans:-apple-system,"Segoe UI","Microsoft YaHei","PingFang SC",sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:var(--sans);color:var(--ink);background:var(--paper);
  background-image:
    linear-gradient(var(--grid) 1px,transparent 1px),
    linear-gradient(90deg,var(--grid) 1px,transparent 1px);
  background-size:28px 28px;
  min-height:100vh;
}
.wrap{max-width:880px;margin:0 auto;padding:24px 16px 80px}

/* ===== 头部 ===== */
header{
  background:var(--card);border:1px solid var(--grid);border-radius:var(--radius);
  padding:22px 24px 18px;margin-bottom:18px;position:relative;overflow:hidden;
  box-shadow:0 2px 0 rgba(34,48,58,.05);
}
header::before{
  content:"";position:absolute;left:38px;top:0;bottom:0;width:2px;background:var(--red);opacity:.55;
}
h1{font-size:24px;letter-spacing:1px;padding-left:24px}
h1 .en{font-family:var(--serif);font-style:italic;font-size:16px;color:var(--red);display:block;margin-top:2px;letter-spacing:.5px}
.meta{padding-left:24px;margin-top:10px;font-size:13px;color:var(--ink-soft);display:flex;gap:16px;flex-wrap:wrap;align-items:center}
.meta b{color:var(--ink)}
button{font-family:var(--sans);cursor:pointer;border:none;border-radius:6px;font-size:13px}
.btn-ghost{background:none;border:1px dashed var(--line);color:var(--ink-soft);padding:4px 10px}
.btn-ghost:hover{border-color:var(--red);color:var(--red)}
.btn-ghost.on{border-style:solid;border-color:var(--red);color:var(--red)}

/* ===== 今日任务 ===== */
.panel{background:var(--card);border:1px solid var(--grid);border-radius:var(--radius);padding:18px 20px;margin-bottom:18px}
.panel h2{font-size:16px;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.panel h2::before{content:"";width:8px;height:8px;background:var(--red);border-radius:50%}
.task{
  display:flex;align-items:center;justify-content:space-between;gap:12px;
  padding:10px 12px;border-radius:8px;margin-bottom:8px;background:var(--paper);
  border:1px solid var(--grid);font-size:14px;flex-wrap:wrap;
}
.task .tag{font-size:12px;padding:2px 8px;border-radius:999px;background:var(--red-soft);color:var(--red);margin-right:8px}
.task .tag.new{background:#E3EEDC;color:#3E7031}
.task a{color:var(--ink);text-decoration:underline dotted var(--line);cursor:pointer}
.task a:hover{color:var(--red)}
.done-txt{color:#3E7031;font-weight:600;font-size:13px}
.empty{color:var(--ink-soft);font-size:14px;padding:6px 2px}

/* 红笔对勾打卡按钮 */
.tick{
  width:46px;height:34px;background:none;border:1.5px solid var(--line);border-radius:6px;
  font-size:20px;color:transparent;transition:all .15s;position:relative;flex:none;
}
.tick:hover{border-color:var(--red)}
.tick.on{border-color:transparent;color:var(--red);transform:rotate(-6deg);font-weight:700}
.tick.on::after{content:"";position:absolute;inset:-4px;border:2px solid var(--red);border-radius:50% 45% 55% 48%;opacity:.7;transform:rotate(4deg)}
.tick:focus-visible{outline:2px solid var(--red);outline-offset:2px}

/* ===== 日期页签 ===== */
.tabs{display:flex;gap:6px;margin-bottom:0;flex-wrap:wrap}
.tabs button{
  background:var(--card);border:1px solid var(--grid);padding:8px 14px;border-radius:8px 8px 0 0;
  color:var(--ink-soft);font-size:14px;border-bottom:2px solid transparent;
}
.tabs button.cur{color:var(--red);border-bottom-color:var(--red);font-weight:700}
.tabs button .sub{display:block;font-size:11px;color:var(--ink-soft);font-weight:400}

/* ===== 小组导航 ===== */
.groups{display:flex;gap:6px;flex-wrap:wrap;padding:12px 20px 4px}
.groups button{
  background:var(--paper);border:1px solid var(--grid);border-radius:999px;
  padding:5px 12px;font-size:13px;color:var(--ink-soft);
}
.groups button.cur{background:var(--red);border-color:var(--red);color:#fff;font-weight:600}

/* ===== 单词列表 ===== */
.words{background:var(--card);border:1px solid var(--grid);border-radius:0 var(--radius) var(--radius) var(--radius)}
.wtools{display:flex;justify-content:space-between;align-items:center;padding:12px 20px 0;font-size:13px;color:var(--ink-soft);flex-wrap:wrap;gap:8px}
.wtools .btns{display:flex;gap:8px;flex-wrap:wrap}
.wrow{
  display:grid;grid-template-columns:34px 36px minmax(120px,1fr) minmax(90px,.9fr) 1.3fr;gap:10px;align-items:center;
  padding:9px 20px;border-bottom:1px dashed var(--grid);
}
.wrow:last-child{border-bottom:none}
.wrow .no{font-family:var(--serif);font-style:italic;color:var(--ink-soft);font-size:13px;text-align:right}
.wrow .en{font-family:var(--serif);font-size:20px;letter-spacing:.4px;cursor:pointer}
.wrow .en:hover{color:var(--red)}
.spk{
  width:30px;height:30px;border-radius:50%;background:none;border:1px solid var(--grid);
  color:var(--ink-soft);font-size:14px;flex:none;
}
.spk:hover{border-color:var(--red);color:var(--red)}
.spk.playing{border-color:var(--red);color:var(--red);background:var(--red-soft)}
.wrow .ph{font-size:13.5px;color:var(--ink-soft);font-family:"Segoe UI","Arial",sans-serif;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hide-ph .wrow .ph{visibility:hidden}
.wrow .zh{font-size:14px;border-radius:4px;padding:2px 6px;cursor:default;line-height:1.45}
.hide-zh .wrow .zh{background:var(--marker);color:transparent;cursor:pointer;user-select:none}
.hide-zh .wrow .zh.peek{color:var(--ink);background:none}

/* ===== 打卡总表 ===== */
table{width:100%;border-collapse:collapse;font-size:13px}
th,td{border:1px solid var(--grid);padding:8px 6px;text-align:center}
th{background:var(--paper);font-weight:600;color:var(--ink-soft)}
td:first-child{text-align:left;padding-left:12px;white-space:nowrap}
td .tick{width:38px;height:30px;font-size:17px}
td.today-col{background:#FFF8DF}
.legend{font-size:12px;color:var(--ink-soft);margin-top:10px;line-height:1.8}
.progress{height:8px;background:var(--paper);border:1px solid var(--grid);border-radius:99px;overflow:hidden;margin:12px 0 4px}
.progress i{display:block;height:100%;background:var(--red);border-radius:99px;transition:width .3s}
.ptxt{font-size:12px;color:var(--ink-soft)}

@media (max-width:600px){
  .wrow{grid-template-columns:26px 32px 1fr;grid-template-rows:auto auto;padding:9px 12px;row-gap:2px}
  .wrow .ph{grid-column:3}
  .wrow .zh{grid-column:2/4}
  table{font-size:12px}
  td .tick{width:32px;height:28px}
}
@media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>
<div class="wrap">

<header>
  <h1>中考词汇打卡本
    <span class="en" id="subTitle">A Seven-Day Ebbinghaus Wordbook</span>
  </h1>
  <div class="meta">
    <span>开始日期：<b id="startDate">—</b></span>
    <span>今天是第 <b id="dayNo">—</b> 天</span>
    <button class="btn-ghost" id="btnReset">重新开始（清空打卡）</button>
  </div>
</header>

<section class="panel">
  <h2>今日任务（按艾宾浩斯节奏自动生成）</h2>
  <div id="todayTasks"></div>
</section>

<nav class="tabs" id="tabs"></nav>
<section class="words" id="wordPanel">
  <div class="wtools">
    <span id="listTitle"></span>
    <span class="btns">
      <button class="btn-ghost" id="btnAccent">发音：美音</button>
      <button class="btn-ghost" id="btnPh">隐藏音标</button>
      <button class="btn-ghost" id="btnHide">遮住中文自测</button>
    </span>
  </div>
  <nav class="groups" id="groupNav"></nav>
  <div id="wordList"></div>
</section>

<section class="panel" style="margin-top:18px">
  <h2>七天复习总表</h2>
  <div style="overflow-x:auto"><table id="matrix"></table></div>
  <div class="progress"><i id="pbar" style="width:0"></i></div>
  <div class="ptxt" id="ptxt"></div>
  <div class="legend">
    艾宾浩斯遗忘曲线提示：新学当天记忆最牢，之后迅速遗忘。在<b>第 1、2、4、7 天</b>各复习一遍，
    每次快速过一遍当天各小组（遮住中文回想、点 🔊 听读音），即可把短期记忆固定为长期记忆。
    点单词本身也可发音。打卡数据保存在本机浏览器里，换浏览器或清缓存会丢失。
  </div>
</section>

</div>

/* ================= 艾宾浩斯复习节点：学习当天 + 第1/2/4/7天 ================= */
const STAGES=[{k:0,n:"学"},{k:1,n:"复①"},{k:2,n:"复②"},{k:4,n:"复③"},{k:7,n:"复④"}];
const TOTAL_WORDS=DAYS.reduce((s,d)=>s+d.g.reduce((a,g)=>a+g.length,0),0);
document.getElementById("subTitle").textContent="A Seven-Day Ebbinghaus Wordbook · "+TOTAL_WORDS+" words";

/* ================= 本地存储 ================= */
const store={
  get start(){return localStorage.getItem("wb_start")},
  set start(v){localStorage.setItem("wb_start",v)},
  get checks(){try{return JSON.parse(localStorage.getItem("wb_checks"))||{}}catch(e){return{}}},
  set checks(v){localStorage.setItem("wb_checks",JSON.stringify(v))}
};
if(!store.start){store.start=toYMD(new Date())}

function toYMD(d){return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0")}
function dayIndex(){
  const s=new Date(store.start+"T00:00:00"),t=new Date(toYMD(new Date())+"T00:00:00");
  return Math.floor((t-s)/864e5)+1;
}
function key(list,stage){return "L"+list+"S"+stage}
function isDone(list,stage){return !!store.checks[key(list,stage)]}
function toggle(list,stage){
  const c=store.checks;const k=key(list,stage);
  if(c[k])delete c[k];else c[k]=toYMD(new Date());
  store.checks=c;render();
}

/* ================= 发音：浏览器语音合成 ================= */
let accent=localStorage.getItem("wb_accent")||"en-US";
let voiceCache=null;
function pickVoice(){
  const vs=speechSynthesis.getVoices();
  if(!vs.length)return null;
  return vs.find(v=>v.lang===accent)||vs.find(v=>v.lang.startsWith("en"))||null;
}
speechSynthesis.onvoiceschanged=()=>{voiceCache=pickVoice()};
function speak(word,btn){
  try{
    speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(word);
    u.lang=accent;u.rate=.85;
    if(!voiceCache)voiceCache=pickVoice();
    if(voiceCache)u.voice=voiceCache;
    if(btn){btn.classList.add("playing");u.onend=u.onerror=()=>btn.classList.remove("playing")}
    speechSynthesis.speak(u);
  }catch(e){}
}

/* ================= 渲染 ================= */
let curTab=Math.min(Math.max(dayIndex(),1),7),curGroup=0;
let hideZh=false,hidePh=false;

function render(){
  const dn=dayIndex();
  document.getElementById("startDate").textContent=store.start;
  document.getElementById("dayNo").textContent=dn<1?"未开始":dn;

  /* 今日任务 */
  const box=document.getElementById("todayTasks");box.innerHTML="";
  let due=[];
  for(let l=1;l<=7;l++)for(const s of STAGES){
    if(l+s.k===dn)due.push({l,s});
  }
  if(due.length===0){
    box.innerHTML='<div class="empty">'+(dn>14?"14 天计划已全部走完，可以点「重新开始」再来一轮巩固。":"今天没有到期任务，翻看任意一天的单词自由复习即可。")+'</div>';
  }else{
    for(const{l,s}of due){
      const day=DAYS[l-1],cnt=day.g.reduce((a,g)=>a+g.length,0);
      const d=document.createElement("div");d.className="task";
      const done=isDone(l,s.k);
      d.innerHTML='<span><span class="tag'+(s.k===0?' new':'')+'">'+(s.k===0?"新学":"第"+s.k+"天复习")+'</span>'
        +'<a data-go="'+l+'">Day '+l+'（'+cnt+' 词 · '+day.g.length+' 组）</a>'
        +(done?' <span class="done-txt">✓ 已打卡</span>':'')+'</span>';
      const b=document.createElement("button");
      b.className="tick"+(done?" on":"");b.textContent="✓";
      b.title=done?"取消打卡":"打卡";
      b.onclick=()=>toggle(l,s.k);
      d.appendChild(b);box.appendChild(d);
    }
    box.querySelectorAll("a[data-go]").forEach(a=>a.onclick=()=>{curTab=+a.dataset.go;curGroup=0;render();
      document.getElementById("wordPanel").scrollIntoView({behavior:"smooth"});});
  }

  /* 页签 */
  const tabs=document.getElementById("tabs");tabs.innerHTML="";
  DAYS.forEach((d,i)=>{
    const cnt=d.g.reduce((a,g)=>a+g.length,0);
    const b=document.createElement("button");
    b.className=i+1===curTab?"cur":"";
    b.innerHTML="Day "+(i+1)+'<span class="sub">'+cnt+" 词</span>";
    b.onclick=()=>{curTab=i+1;curGroup=0;render()};
    tabs.appendChild(b);
  });

  /* 小组导航 */
  const day=DAYS[curTab-1];
  if(curGroup>=day.g.length)curGroup=0;
  const gn=document.getElementById("groupNav");gn.innerHTML="";
  let base=0;
  day.g.forEach((g,i)=>{
    const b=document.createElement("button");
    b.className=i===curGroup?"cur":"";
    b.textContent="组"+(i+1)+"（"+(base+1)+"-"+(base+g.length)+"）";
    b.onclick=()=>{curGroup=i;render()};
    gn.appendChild(b);base+=g.length;
  });

  /* 工具条状态 */
  const cnt=day.g.reduce((a,g)=>a+g.length,0);
  document.getElementById("listTitle").textContent="Day "+curTab+" · 共 "+cnt+" 词 · 第 "+(curGroup+1)+" 组";
  document.getElementById("btnHide").textContent=hideZh?"显示全部中文":"遮住中文自测";
  document.getElementById("btnPh").textContent=hidePh?"显示音标":"隐藏音标";
  document.getElementById("btnPh").classList.toggle("on",hidePh);
  document.getElementById("btnAccent").textContent="发音："+(accent==="en-US"?"美音":"英音");
  const panel=document.getElementById("wordPanel");
  panel.classList.toggle("hide-zh",hideZh);
  panel.classList.toggle("hide-ph",hidePh);

  /* 单词表：当前小组 */
  const wl=document.getElementById("wordList");wl.innerHTML="";
  let no=0;for(let i=0;i<curGroup;i++)no+=day.g[i].length;
  day.g[curGroup].forEach(w=>{
    no++;
    const r=document.createElement("div");r.className="wrow";
    const ph=w[1]?"/"+w[1]+"/":"";
    r.innerHTML='<span class="no">'+no+'</span>'
      +'<button class="spk" title="播放读音">🔊</button>'
      +'<span class="en">'+w[0]+'</span>'
      +'<span class="ph">'+ph+'</span>'
      +'<span class="zh">'+w[2]+'</span>';
    const sb=r.querySelector(".spk");
    sb.onclick=()=>speak(w[0],sb);
    r.querySelector(".en").onclick=()=>speak(w[0],sb);
    r.querySelector(".zh").onclick=e=>{if(hideZh)e.target.classList.toggle("peek")};
    wl.appendChild(r);
  });

  /* 复习总表 */
  const m=document.getElementById("matrix");
  let html="<tr><th>词表</th>"+STAGES.map(s=>"<th>"+s.n+"<br><span style='font-weight:400'>第"+(s.k===0?"0":s.k)+"天后</span></th>").join("")+"</tr>";
  let total=0,doneN=0;
  for(let l=1;l<=7;l++){
    const c=DAYS[l-1].g.reduce((a,g)=>a+g.length,0);
    html+="<tr><td>Day "+l+"（"+c+" 词）</td>";
    for(const s of STAGES){
      total++;const dd=isDone(l,s.k);if(dd)doneN++;
      const isToday=l+s.k===dn;
      html+='<td'+(isToday?' class="today-col"':'')+'><button class="tick'+(dd?" on":"")+'" data-l="'+l+'" data-s="'+s.k+'" title="Day '+l+' '+s.n+'">✓</button></td>';
    }
    html+="</tr>";
  }
  m.innerHTML=html;
  m.querySelectorAll("button.tick").forEach(b=>b.onclick=()=>toggle(+b.dataset.l,+b.dataset.s));
  document.getElementById("pbar").style.width=(doneN/total*100)+"%";
  document.getElementById("ptxt").textContent="总进度："+doneN+" / "+total+" 次打卡（"+Math.round(doneN/total*100)+"%）· 黄色列为今天到期";
}

document.getElementById("btnHide").onclick=()=>{hideZh=!hideZh;render()};
document.getElementById("btnPh").onclick=()=>{hidePh=!hidePh;render()};
document.getElementById("btnAccent").onclick=()=>{
  accent=accent==="en-US"?"en-GB":"en-US";
  localStorage.setItem("wb_accent",accent);voiceCache=null;render();
};
document.getElementById("btnReset").onclick=()=>{
  if(confirm("确定清空全部打卡记录，并把今天设为第 1 天吗？")){
    localStorage.removeItem("wb_checks");store.start=toYMD(new Date());curTab=1;curGroup=0;render();
  }
};
render();
</script>
</body>
</html>
