<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>英语语法大地图</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #f4f7fb;
    --line: #b8c6dd;
    --root-color: #3b5bdb;
    --branch1: #1971c2;
    --branch2: #2f9e44;
    --branch3: #e8590c;
    --branch4: #9c36b5;
    --branch5: #c92a2a;
    --card-bg: #ffffff;
    --text: #23324a;
  }
  body {
    font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
    background: var(--bg);
    color: var(--text);
    overflow: hidden;
    height: 100vh;
  }

  /* 顶栏 */
  header {
    position: fixed; top: 0; left: 0; right: 0; height: 56px;
    background: #ffffffee; backdrop-filter: blur(6px);
    display: flex; align-items: center; gap: 16px;
    padding: 0 20px; z-index: 100;
    box-shadow: 0 1px 6px rgba(30,50,90,.08);
  }
  header h1 { font-size: 18px; color: var(--root-color); }
  header .tip { font-size: 12px; color: #7b8aa5; }
  header button {
    margin-left: auto; border: 1px solid #d0d9ea; background: #fff;
    border-radius: 8px; padding: 6px 14px; font-size: 13px; cursor: pointer;
    color: #3b5bdb;
  }
  header button:hover { background: #eef2ff; }
  header a.clinic {
    border: 1px solid #d0d9ea; background: #fff; border-radius: 8px;
    padding: 6px 14px; font-size: 13px; color: #e03131; text-decoration: none;
  }
  header a.clinic:hover { background: #fff0f0; }

  /* 画布：可拖动 */
  #viewport {
    position: absolute; inset: 0; top: 56px;
    cursor: grab; overflow: hidden;
  }
  #viewport.dragging { cursor: grabbing; }
  #canvas {
    position: absolute; left: 0; top: 0;
    transform-origin: 0 0;
    min-width: 2000px; min-height: 1400px;
    padding: 60px;
  }

  /* 思维导图树形布局 */
  .tree { display: flex; align-items: center; }
  .node-wrap { display: flex; align-items: center; }
  .children {
    display: flex; flex-direction: column; gap: 14px;
    margin-left: 46px; position: relative;
  }
  .child-item { display: flex; align-items: center; position: relative; }
  /* 连接线 */
  .child-item::before {
    content: ""; position: absolute; left: -46px; top: 50%;
    width: 46px; height: 2px; background: var(--line);
  }
  .children::before {
    content: ""; position: absolute; left: -46px; top: 0; bottom: 0;
    width: 2px; background: transparent;
  }
  /* 垂直干线 */
  .children .child-item:not(:only-child)::after {
    content: ""; position: absolute; left: -46px; width: 2px; background: var(--line);
  }
  .children .child-item:first-child:not(:only-child)::after { top: 50%; bottom: -7px; }
  .children .child-item:last-child:not(:only-child)::after { top: -7px; bottom: 50%; }
  .children .child-item:not(:first-child):not(:last-child)::after { top: -7px; bottom: -7px; }

  /* 节点样式 */
  .node {
    background: var(--card-bg);
    border: 2px solid var(--line);
    border-radius: 12px;
    padding: 10px 16px;
    font-size: 14px;
    line-height: 1.5;
    box-shadow: 0 2px 8px rgba(30,50,90,.07);
    cursor: pointer;
    user-select: none;
    white-space: nowrap;
    transition: box-shadow .15s, transform .15s;
    position: relative;
  }
  .node:hover { box-shadow: 0 4px 14px rgba(30,50,90,.16); transform: translateY(-1px); }

  .node.root {
    background: var(--root-color); color: #fff; border-color: var(--root-color);
    font-size: 22px; font-weight: bold; padding: 18px 30px; border-radius: 16px;
  }
  .node.level1 { font-size: 17px; font-weight: bold; padding: 13px 22px; color: #fff; }
  .node.level2 { font-weight: bold; }

  .node .sub { display: block; font-size: 12px; font-weight: normal; opacity: .75; margin-top: 2px; white-space: nowrap; }

  /* 展开/收起小圆点 */
  .toggle {
    position: absolute; right: -13px; top: 50%; transform: translateY(-50%);
    width: 20px; height: 20px; border-radius: 50%;
    background: #fff; border: 2px solid var(--line);
    font-size: 12px; line-height: 16px; text-align: center; color: #5c7099;
    z-index: 2;
  }

  /* 详情卡片（叶子知识点） */
  .node.leaf { white-space: normal; max-width: 380px; cursor: default; }
  .node.leaf .detail { font-size: 13px; color: #51627e; margin-top: 6px; display: none; }
  .node.leaf.open .detail { display: block; }
  .node.leaf { cursor: pointer; }
  .node.leaf .detail .en { color: #1971c2; font-weight: bold; }
  .node.leaf .detail .zh { color: #868e96; }
  .node.leaf .detail p { margin: 4px 0; }
  .node.leaf .detail .rule { background: #f1f5fb; border-radius: 6px; padding: 6px 8px; margin: 6px 0; }

  /* 方位介词图解 */
  .prep-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin-top: 8px; }
  .prep-grid figure { text-align: center; background: #f8fafd; border-radius: 8px; padding: 4px 2px; }
  .prep-grid figcaption { font-size: 12px; font-weight: bold; color: #1971c2; line-height: 1.3; }
  .prep-grid figcaption .cn { color: #868e96; font-weight: normal; font-size: 11px; }

  .collapsed > .children { display: none; }

  footer.hint {
    position: fixed; bottom: 14px; left: 50%; transform: translateX(-50%);
    background: #ffffffcc; padding: 6px 18px; border-radius: 20px;
    font-size: 12px; color: #7b8aa5; z-index: 100;
    box-shadow: 0 1px 6px rgba(30,50,90,.08);
  }
</style>
</head>

<footer class="hint">拖动空白处移动地图 · 滚轮缩放 · 点节点展开/收起 · 点知识卡查看详情</footer>

<script>
/* ================================================================
   数据区：以后补充新语法知识，只需要往这个对象里加节点即可。
   节点字段说明：
   - title  : 节点标题
   - sub    : 副标题（小字，可省略）
   - color  : 分支主题色（只在一级分支设置，可省略）
   - detail : 详情内容（HTML，叶子知识卡点击展开，可省略）
   - children : 子节点数组（可省略）

/* --- 方位图解绘图小工具（橙盒子 + 绿小球）--- */
function cube(x, y) {
  return `<rect x="${x}" y="${y+12}" width="40" height="40" fill="#e07b39" stroke="#8c4a1f" stroke-width="2"/>`
       + `<polygon points="${x},${y+12} ${x+12},${y} ${x+52},${y} ${x+40},${y+12}" fill="#f2a65e" stroke="#8c4a1f" stroke-width="2"/>`
       + `<polygon points="${x+40},${y+12} ${x+52},${y} ${x+52},${y+40} ${x+40},${y+52}" fill="#c05f2a" stroke="#8c4a1f" stroke-width="2"/>`;
}
function ball(cx, cy) {
  return `<circle cx="${cx}" cy="${cy}" r="12" fill="#7bbf4e" stroke="#4a8a2a" stroke-width="2"/>`;
}
function fig(svg, en, zh, vb) {
  return `<figure><svg viewBox="${vb || '0 0 100 100'}" width="80" height="72">${svg}</svg>`
       + `<figcaption>${en}<br><span class="cn">${zh}</span></figcaption></figure>`;
}
const prepFigures =
  fig( /* in：球在盒子里（下半被前壁挡住） */
    `<polygon points="25,47 37,35 77,35 65,47" fill="#f2a65e" stroke="#8c4a1f" stroke-width="2"/>`
    + ball(45, 44)
    + `<rect x="25" y="47" width="40" height="40" fill="#e07b39" stroke="#8c4a1f" stroke-width="2"/>`
    + `<polygon points="65,47 77,35 77,75 65,87" fill="#c05f2a" stroke="#8c4a1f" stroke-width="2"/>`,
    "IN", "在…里")
  + fig(cube(25, 40) + ball(50, 34), "ON", "在…上")
  + fig(cube(25, 5) + ball(45, 78), "UNDER", "在…下")
  + fig(cube(8, 35) + ball(78, 75), "NEXT TO", "在…旁边")
  + fig(ball(60, 33) + cube(18, 40), "BEHIND", "在…后面")
  + fig(cube(30, 15) + ball(40, 78), "IN FRONT OF", "在…前面")
  + fig(cube(0, 35) + cube(56, 35) + ball(54, 80), "BETWEEN", "在…之间", "0 0 110 100");

const grammarMap = {
  title: "英语语法",
  sub: "English Grammar",
  children: [
    {
      title: "主系表句型",
      sub: "主语 + 系动词 + 表语",
      color: "var(--branch1)",
      children: [
        {
          title: "怎么判断",
          color: "var(--branch2)",
          children: [
            {
              title: "出现「是」字 → 主系表",
              detail: `<p>「是」后面接<b>名词</b>，说明身份 / 类别。</p>
                       <p class="rule">他是老师。→ <span class="en">He is a teacher.</span></p>`
            },
            {
              title: "出现「很」字 → 主系表",

                       <p class="zh">注意：「很」不用直译，be + 形容词已表达状态。</p>`
            },
            {
              title: "出现「在」字 → 主系表",
              detail: `<p>「在」表示位置，表语是<b>介词短语</b>。</p>
                       <p>英文表达：<span class="en">be + in / at / on + 地点</span></p>
                       <p class="rule">他在教室里。→ <span class="en">He is in the classroom.</span></p>`
            }
          ]
        },
        {
          title: "be 动词的规矩",
          color: "var(--branch3)",
          children: [
            {
              title: "我用 am",
              detail: `<p class="rule"><span class="en">I am a student.</span> <span class="zh">我是学生。</span></p>`
            },
            {
              title: "你用 are",
              detail: `<p class="rule"><span class="en">You are my friend.</span> <span class="zh">你是我的朋友。</span></p>`
            },
            {
              title: "他 / 她 / 它用 is",

            {
              title: "数量一个用 is，数量多个用 are",

              title: "为什么这么分？",

            }

            {

            },

              title: "「很」+ 形容词",

                       <p class="rule">她很漂亮。→ <span class="en">She is beautiful.</span></p>`
            },
            {
              title: "「在」+ 介词短语（地点）",
              detail: `<p>说明位置。</p>
                       <p class="rule">他在教室里。→ <span class="en">He is in the classroom.</span></p>`
            },
            {
              title: "位置表达公式",
              detail: `<p>中文<b>方位词提前</b>变介词：</p>
                       <p class="rule">屋里 = …里 + the + 屋 = <span class="en">in the room</span></p>
                       <p class="rule">桌上 = …上 + the + 桌 = <span class="en">on the table</span></p>

                       <p class="rule">桌旁 = …旁 + the + 桌 = <span class="en">beside the table</span><span class="zh">（= next to the table）</span></p>
                       <p class="rule">学校附近 = …附近 + the + 学校 = <span class="en">near the school</span></p>
                       <p class="rule">两楼之间 = …之间 + the + 楼 = <span class="en">between the buildings</span></p>
                       <p class="rule">房间中间 = …中间 + the + 房间 = <span class="en">in the middle of the room</span></p>
                       <p class="rule">门左边 = …左边 + the + 门 = <span class="en">on the left of the door</span></p>
                       <p class="rule">门右边 = …右边 + the + 门 = <span class="en">on the right of the door</span><br>
                       <span class="zh">（单说"在左边/右边"不带对象时：on the left / on the right）</span></p>
                       <p class="rule">银行对面 = …对面 + the + 银行 = <span class="en">across from the bank</span><span class="zh">（= opposite the bank）</span></p>
                       <p class="rule">屋外 = …外 + the + 屋 = <span class="en">outside the room</span></p>
                       <p class="rule">湖面正上方 = <span class="en">over the lake</span><span class="zh">（正上方悬空，不接触）</span></p>
                       <p class="rule">山顶之上 = <span class="en">above the mountain</span><span class="zh">（高于即可，不一定正上方）</span></p>
                       <p class="rule">山脚之下 = <span class="en">below the mountain</span><span class="zh">（低于即可，不一定正下方）</span></p>
                       <p class="rule">人群之中 = <span class="en">among the people</span><span class="zh">（三者以上；两者用 between）</span></p>
                       <p class="rule">桌子周围 = <span class="en">around the table</span></p>
                       <p class="rule">窗户旁 = <span class="en">by the window</span><span class="zh">（= beside，比 near 更近）</span></p>
                       <p class="rule">墙上（挂着，接触墙面）= <span class="en">on the wall</span></p>
                       <p class="rule">天上 / 空中 = <span class="en">in the sky</span></p>
                       <p class="rule">车站（某个点）= <span class="en">at the station</span></p>`
            },
            {
              title: "易混介词对比 ⚖️",
              detail: `<p class="rule">"<b>旁边</b>"一族（三个几乎一样，都比 near 更近）：<br>
                       <span class="en">beside / next to / by the table</span> = 在桌子旁边</p>
                       <p class="rule"><span class="en">on</span> 接触表面 vs <span class="en">over</span> 正上方悬空 vs <span class="en">above</span> 只要高于：<br>
                       书在桌上 <span class="en">on the desk</span> / 灯在桌子正上方 <span class="en">over the desk</span> / 飞机在城市上空 <span class="en">above the city</span></p>
                       <p class="rule"><span class="en">under</span> 正下方 vs <span class="en">below</span> 只要低于：<br>

                       <p class="rule"><span class="en">between</span> 两者之间 vs <span class="en">among</span> 三者以上之间：<br>
                       两楼之间 <span class="en">between the buildings</span> / 人群之中 <span class="en">among the people</span></p>`

            {

                       <p class="rule">方位词是<b>介词</b>（一个词就能表位置）→ <b>不加 of</b>：<br>
                       <span class="en">in / on / under / behind / near / beside / between</span><br>
                       例：<span class="en">on the table</span>、<span class="en">behind the room</span></p>
                       <p class="rule">方位词是<b>名词</b>（部位名词：front 前部、middle 中部、top 顶部…）→ 名词连名词必须用 <b>of（…的）</b>连接：<br>
                       <span class="en">in the middle of the room</span> <span class="zh">在房间"的"中部</span><br>
                       <span class="en">in front of the door</span> <span class="zh">在门"的"前部</span></p>

                       <p>💡 口诀：<b>方位词是名词，就要 of；方位词是介词，就不要 of。</b></p>`
            },
            {
              title: "位置介词记忆法 🧠",
              detail: `<p>成对成组记，不要一个个背：</p>
                       <p class="rule">① <b>反义词成对记</b>（记一个送一个）：<br>
                       <span class="en">on</span> 上 ↔ <span class="en">under</span> 下<br>
                       <span class="en">in front of</span> 前 ↔ <span class="en">behind</span> 后<br>
                       <span class="en">in</span> 里 ↔ <span class="en">outside</span> 外<br>
                       <span class="en">on the left</span> 左 ↔ <span class="en">on the right</span> 右</p>
                       <p class="rule">② <b>按距离排一条线</b>：<br>
                       <span class="en">next to</span> 紧挨着 → <span class="en">near</span> 不挨但不远 → <span class="en">between</span> 夹两者中间 → <span class="en">in the middle of</span> 正中间</p>
                       <p class="rule">③ <b>易混三兄弟按"接触感"区分</b>：<br>
                       <span class="en">in</span> = 被包住：<span class="en">in the room</span><br>
                       <span class="en">on</span> = 贴着表面（有接触）：<span class="en">on the table / on the wall</span><br>
                       <span class="en">at</span> = 一个"点"（不管里外）：<span class="en">at the station / at the door</span></p>
                       <p class="rule">④ <b>一句话串记</b>（想着盒子小球图）：<br>
                       <span class="en">The ball is in the box, on the box, under the box, next to the box, behind the box, in front of the box, between the boxes.</span></p>`
            },
            {
              title: "方位介词图解 🧊🟢",
              detail: `<p>橙盒子和绿小球的位置关系：</p><div class="prep-grid">${prepFigures}</div>`
            }
          ]
        }
      ]
    },
    {
      title: "主谓宾句型",
      sub: "主语 + 谓语动词 + 宾语",
      color: "var(--branch5)",
      children: [
        {
          title: "主宾表存在动词要变形",
          children: [
            {
              title: "总规矩：做过ing，没做to",
              detail: `<p>① 主谓宾句型中，<b>主语、宾语</b>存在动词要变形：<b>做过</b>，在动词后加 <b>ing</b>；<b>没做</b>，在动词前加 <b>to</b>。</p>
                       <p>② 同理，主系表句型中，<b>主语、表语</b>存在动词也要变形，方式同上。</p>
                       <p class="rule">💡 故记住一句话：<b>主宾表存在动词要变形。</b></p>
                       <p class="rule"><b>主语</b>位置：<br>
                       <span class="en">Sing<b>ing</b> is fun.</span> <span class="zh">唱歌很有趣——做过的体验</span><br>
                       <span class="en"><b>To win</b> is not easy.</span> <span class="zh">要赢不容易——还没赢</span></p>
                       <p class="rule"><b>表语</b>位置：<br>
                       <span class="en">My hobby is sing<b>ing</b>.</span> <span class="zh">我的爱好是唱歌——一直在做</span><br>
                       <span class="en">My dream is <b>to travel</b>.</span> <span class="zh">我的梦想是旅行——还没去做</span></p>`
            },

              detail: `<p>宾语位置放动词，不能用原形，必须变形。判断标准就是"<b>唱没唱过</b>"：</p>
                       <p class="rule"><b>唱过的</b>（已经发生 / 体验过的事）→ 动词加 <b>ing</b>：<br>
                       <span class="en">I enjoy sing<b>ing</b>.</span> <span class="zh">我喜欢唱歌——唱过才知道喜欢</span><br>

                       <span class="en">I want <b>to sing</b>.</span> <span class="zh">我想唱歌——还没唱，打算去唱</span><br>
                       <span class="en">She hopes <b>to win</b>.</span> <span class="zh">她希望赢——还没赢，是愿望</span></p>
                       <p class="rule">常见搭配：<br>
                       接 ing 的：<span class="en">enjoy</span> 享受 / <span class="en">finish</span> 完成 / <span class="en">practice</span> 练习 / <span class="en">keep</span> 保持<br>

            }
          ]
        },
        {

    },
    {

            },
            {

                       <p class="rule"><b>拥有</b>（用 have / has）：我有一张桌子。→ <span class="en">I have a desk.</span> <span class="zh">（"拥有"不用 there be）</span></p>`
            },
            {
              title: "⚖️ 和主谓宾区分开",

                       <span class="en">I <b>have</b> a desk.</span> <span class="zh">我有一张桌子（我=主语，have=谓语，desk=宾语）</span><br>

                       <p class="rule"><b>存在的"有"→ there be 句型</b>：<br>

                       <p>💡 判断方法：把"有"换成"<b>拥有</b>"读一遍，通顺 → 主谓宾（have/has）；不通顺，只是"<b>某处存在</b>" → there be。<br>
                       "我拥有一张桌子"✓ 通顺 → have；"教室拥有一张桌子"✗ 别扭 → there be。</p>`

        },

                   ② <b>判断句型</b>：看医生 → 动词 → 主谓宾句型<br>
                   ③ <b>得出结果</b>：<span class="en">You must see a doctor.</span><br>
                   ④ <b>插入情态动词</b>：<span class="en">Your condition is serious, and you <b>must</b> see a doctor.</span></p>`
        },
        {
          title: "核心规矩",
          detail: `<p>情态动词放在<b>谓语动词前面</b>，给动词加"态度 / 语气"（必须、能、应该……）。</p>
                   <p class="rule">情态动词后面接<b>动词原形</b>（不加S、不加ing、不加to）。</p>
                   <p class="rule">有情态动词时，谓语动词<b>不用变三单</b>：<br>

        },
        {
          title: "常见情态动词总结 📋",
          detail: `<p class="rule"><span class="en"><b>must</b></span> 必须、得（语气最强）：<span class="en">You must see a doctor.</span> <span class="zh">你得看医生</span></p>
                   <p class="rule"><span class="en"><b>can</b></span> 能、会：<span class="en">I can swim.</span> <span class="zh">我会游泳</span></p>

                   <p class="rule"><span class="en"><b>may</b></span> 可以（请求许可）、也许：<span class="en">May I come in?</span> <span class="zh">我可以进来吗</span></p>
                   <p class="rule"><span class="en"><b>might</b></span> 也许（可能性更小）：<span class="en">It might rain.</span> <span class="zh">也许会下雨</span></p>
                   <p class="rule"><span class="en"><b>should</b></span> 应该（建议）：<span class="en">You should sleep early.</span> <span class="zh">你应该早点睡</span></p>

                   <p class="rule"><span class="en"><b>would</b></span> 愿意（更客气）：<span class="en">Would you like some tea?</span> <span class="zh">您想来点茶吗</span></p>
                   <p class="rule"><span class="en"><b>need</b></span> 需要：<span class="en">You need to rest.</span> <span class="zh">你需要休息</span></p>
                   <p class="rule"><span class="en"><b>had better</b></span> 最好：<span class="en">You had better go now.</span> <span class="zh">你最好现在走</span></p>
                   <p>💡 语气从强到弱：<b>must</b> 必须 > <b>should</b> 应该 > <b>can / may</b> 能 / 可以 > <b>might</b> 也许</p>`
        }
      ]
    },
    {
      title: "口语动词",
      sub: "得 / 必须 / 要 / 会 → 情态动词",
      color: "var(--branch4)",
      children: [
        {
          title: "什么是口语动词",
          detail: `<p>中文口语里带语气的小词——"<b>得、必须、要、会</b>"——翻成英语就是<b>情态动词</b>。</p>
                   <p class="rule">翻译时照样用三步法：<b>裸句 → 判断句型 → 插入情态动词</b>。</p>`
        },
        {
          title: "对应表 📋",
          detail: `<p class="rule">得 → <span class="en"><b>must / have to</b></span>：我得走了</p>
                   <p class="rule">必须 → <span class="en"><b>must</b></span>：我必须出门了</p>
                   <p class="rule">要 → <span class="en"><b>will</b></span>（打算、将要）：我要回家了</p>
                   <p class="rule">会 → <span class="en"><b>will</b></span>（将会发生）：你会爱上我<br>
                   会 → <span class="en"><b>can</b></span>（表示能力）：我会游泳 <span class="en">I can swim.</span></p>
                   <p>💡 "会"看意思选：将会发生用 will，有能力做用 can。情态动词后照旧接<b>动词原形</b>。</p>`
        },

                   <p class="rule">② 我<b>必须</b>出门了。<br>裸句：我出门 → <span class="en">I go out</span> → 插入：<span class="en">I <b>must</b> go out.</span></p>
                   <p class="rule">③ 我<b>要</b>回家了。<br>裸句：我回家 → <span class="en">I go home</span> → 插入：<span class="en">I <b>will</b> go home.</span></p>
                   <p class="rule">④ 这个房子很漂亮。我<b>要</b>拍一些照片。<br>
                   前半句主系表：<span class="en">This house is beautiful</span><br>

                   <span class="en">This house is beautiful, and I <b>will</b> take some photos.</span></p>

/* ================= 渲染引擎（不用改） ================= */
function renderNode(data, level) {
  const wrap = document.createElement("div");
  wrap.className = "node-wrap";

  const item = document.createElement("div");
  item.className = "child-item";

  const node = document.createElement("div");
  node.className = "node" + (level === 0 ? " root" : level === 1 ? " level1" : " level2");
  if (data.color && level >= 1) {
    if (level === 1) { node.style.background = data.color; node.style.borderColor = data.color; }
    else { node.style.borderColor = data.color; }
  }
  node.innerHTML = `<span>${data.title}</span>` + (data.sub ? `<span class="sub">${data.sub}</span>` : "");

  if (data.detail) {
    node.classList.add("leaf");
    node.classList.remove("level2");
    const d = document.createElement("div");
    d.className = "detail";
    d.innerHTML = data.detail;
    node.appendChild(d);
    node.addEventListener("click", e => { e.stopPropagation(); node.classList.toggle("open"); });
  }

  item.appendChild(node);

  if (data.children && data.children.length) {
    const kids = document.createElement("div");
    kids.className = "children";
    data.children.forEach(c => {
      if (!c.color && data.color) c.color = data.color;
      kids.appendChild(renderNode(c, level + 1));
    });
    const toggle = document.createElement("div");
    toggle.className = "toggle";
    toggle.textContent = "−";
    node.appendChild(toggle);
    node.addEventListener("click", e => {
      if (data.detail) return;
      e.stopPropagation();
      item.classList.toggle("collapsed");
      toggle.textContent = item.classList.contains("collapsed") ? "+" : "−";
    });
    item.appendChild(kids);
  }

  wrap.appendChild(item);
  return wrap;
}

const canvas = document.getElementById("canvas");
const tree = document.createElement("div");
tree.className = "tree";
tree.appendChild(renderNode(grammarMap, 0));
canvas.appendChild(tree);

/* ================= 拖动 & 缩放 ================= */
const viewport = document.getElementById("viewport");
let scale = 1, tx = 40, ty = 60, dragging = false, sx = 0, sy = 0;

function apply() {
  canvas.style.transform = `translate(${tx}px, ${ty}px) scale(${scale})`;
}
function resetView() { scale = 1; tx = 40; ty = 60; apply(); }
resetView();

viewport.addEventListener("mousedown", e => {
  dragging = true; sx = e.clientX - tx; sy = e.clientY - ty;
  viewport.classList.add("dragging");
});
window.addEventListener("mousemove", e => {
  if (!dragging) return;
  tx = e.clientX - sx; ty = e.clientY - sy; apply();
});
window.addEventListener("mouseup", () => { dragging = false; viewport.classList.remove("dragging"); });

viewport.addEventListener("wheel", e => {
  e.preventDefault();
  const factor = e.deltaY < 0 ? 1.1 : 0.9;
  const rect = viewport.getBoundingClientRect();
  const mx = e.clientX - rect.left, my = e.clientY - rect.top;
  tx = mx - (mx - tx) * factor;
  ty = my - (my - ty) * factor;
  scale = Math.min(2.5, Math.max(0.3, scale * factor));
  apply();
}, { passive: false });
</script>
